<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  (function(){
    var D={theme:'nebula',font:'system',textScale:'default',useNewUx:true};
    var p=Object.assign({},D,JSON.parse(localStorage.getItem('mf:preferences:v1')||'{}'));
    var h=document.documentElement;
    h.setAttribute('data-theme',p.theme);
    h.setAttribute('data-font',p.font);
    h.setAttribute('data-text-scale',p.textScale);
    h.setAttribute('data-ux',p.useNewUx?'new':'orig');
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;600&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;500;700&family=Poppins:wght@400;500;600&family=DM+Sans:wght@400;500&family=Crimson+Pro:wght@400;600&display=swap">
  <title>Status — MarkFlow</title>
  <!-- v0.33.0: cache-bust markflow.css; status now mounts the
       shared Pipeline card via static/js/pipeline-card.js (which
       carries its own ?v=0.33.0). Bump on every release that
       adds CSS rules used by status.html. -->
  <link rel="stylesheet" href="/static/markflow.css?v=0.35.0">
  <style>
    /* Clickable counter values (inline file list) */
    .job-card__counts .flp-counter { cursor: pointer; transition: opacity 0.15s; }
    .job-card__counts .flp-counter:hover { opacity: 0.7; text-decoration: underline; }
    .flp-counter.cv-converted { color: var(--mf-color-success); }
    .flp-counter.cv-failed { color: var(--mf-color-error); }
    .flp-counter.cv-skipped { color: var(--mf-color-text-muted); }

    /* File list panel (one per job card) */
    .file-list-panel { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.25s ease; margin-top: 0; }
    .file-list-panel.open { max-height: 600px; opacity: 1; margin-top: 0.75rem; }
    .file-list-panel .flp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .file-list-panel .flp-title { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .file-list-panel .flp-close { background: none; border: none; cursor: pointer; color: var(--mf-color-text-muted); font-size: 1.1rem; padding: 0.2rem 0.4rem; }
    .file-list-panel .flp-close:hover { color: var(--mf-color-text); }
    .file-list-panel .flp-loading { font-size: 0.85rem; color: var(--mf-color-text-muted); padding: 0.5rem 0; }
    .flp-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .flp-table th { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 2px solid var(--mf-border); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; color: var(--mf-color-text-muted); }
    .flp-table td { padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--mf-border); vertical-align: top; }
    .flp-table tr:last-child td { border-bottom: none; }
    .flp-table .flp-fname { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .flp-table .flp-path { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--mf-color-text-muted); font-size: 0.78rem; }
    .flp-table .flp-err { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--mf-color-error); font-size: 0.78rem; }
    .flp-table .flp-size { white-space: nowrap; color: var(--mf-color-text-muted); }
    .file-list-panel .flp-scroll { max-height: 400px; overflow-y: auto; }
    .file-list-panel .flp-load-more { display: block; width: 100%; margin-top: 0.5rem; padding: 0.4rem; text-align: center; background: var(--mf-surface-alt); border: 1px solid var(--mf-border); border-radius: var(--mf-radius-sm); cursor: pointer; font-size: 0.82rem; color: var(--mf-color-text-muted); }
    .file-list-panel .flp-load-more:hover { background: var(--mf-surface); color: var(--mf-color-text); }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">MarkFlow</a>
    <div id="main-nav" class="nav-links"></div>
  </nav>

  <main class="container">
    <!-- Stop banner -->
    <div id="stop-banner" class="stop-banner" hidden>
      <span class="stop-banner__text">Stop requested — jobs are winding down.</span>
      <button class="stop-banner__reset" id="reset-stop-btn">Reset &amp; allow new jobs</button>
    </div>

    <!-- Page header -->
    <div class="status-header">
      <div>
        <h1 data-help="status-page">Active Jobs</h1>
        <p class="status-subtitle" id="status-subtitle">Loading...</p>
      </div>
      <button class="btn btn-danger" id="stop-all-btn">Stop All Jobs</button>
    </div>

    <!-- Pipeline stat strip -->
    <div id="pipeline-stats-strip" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin:0.75rem 0 1rem 0;padding:0.75rem 1rem;background:var(--bg-secondary,#1a1a2e);border-radius:8px;">
      <span style="color:var(--text-muted,#888);align-self:center;margin-right:0.25rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:0.75rem;">Pipeline</span>
      <a class="stat-pill stat-pill--link" href="/pipeline-files.html?status=scanned" id="ps-scanned">— scanned</a>
      <a class="stat-pill stat-pill--link" href="/pipeline-files.html?status=pending" id="ps-pending">— pending</a>
      <a class="stat-pill stat-pill--link" href="/pipeline-files.html?status=failed" id="ps-failed">— failed</a>
      <a class="stat-pill stat-pill--link" href="/pipeline-files.html?status=unrecognized" id="ps-unrecognized">— unrecognized</a>
      <a class="stat-pill stat-pill--link stat-pill--analysis" href="/pipeline-files.html?status=pending_analysis" id="ps-panalysis">— pending analysis</a>
      <a class="stat-pill stat-pill--link stat-pill--batched" href="/batch-management.html" id="ps-batched">— batched</a>
      <a class="stat-pill stat-pill--link stat-pill--afailed" href="/pipeline-files.html?status=analysis_failed" id="ps-afailed">— analysis failed</a>
      <a class="stat-pill stat-pill--link stat-pill--indexed" href="/pipeline-files.html?status=indexed" id="ps-indexed">— indexed</a>
    </div>

    <!-- Job cards container -->
    <div id="jobs-container"></div>

    <!-- v0.33.0: canonical Pipeline card. Replaces the previous
         standalone Lifecycle Scanner card AND Pending card — both
         showed overlapping data (last_scan timestamp, scanner
         running/idle, pending counts) and the operator was
         reading three slightly-different values. The shared
         pipeline-card.js module renders one rich card with all
         the fields plus Pause / Rebuild Index / Run Now controls.
         The Active Jobs section above keeps its per-file live
         scan progress for granular operator-watching. -->

    <!-- v0.35.0: Active Operations index — single-pane view of every
         long-running op. Each row click navigates to the op's
         originating page with ?op_id=… for highlight on arrival. -->
    <div id="active-ops-hub-mount" style="margin-top:1rem"></div>

    <div id="pipeline-card-mount" style="margin-top:1.5rem"></div>

    <!-- Auto-Conversion override card -->
    <div id="auto-convert-container" style="margin-top:1.5rem">
      <div class="job-card">
        <div class="job-card__header">
          <div class="job-card__title">
            <span class="status-pill status-pill--done">AUTO-CONVERSION</span>
            <span class="text-muted text-sm" id="ac-mode-label">Loading...</span>
          </div>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-top:0.5rem">
          <label class="text-sm">Mode override:</label>
          <select id="ac-override-select" style="font-size:0.85rem">
            <option value="">Use setting (no override)</option>
            <option value="off">Off</option>
            <option value="immediate">Immediate</option>
            <option value="queued">Queued</option>
            <option value="scheduled">Scheduled</option>
          </select>
          <select id="ac-override-duration" style="font-size:0.85rem">
            <option value="30">30 min</option>
            <option value="60" selected>1 hour</option>
            <option value="120">2 hours</option>
            <option value="240">4 hours</option>
            <option value="480">8 hours</option>
          </select>
          <button class="btn btn-sm btn-ghost" id="ac-override-apply">Apply</button>
          <button class="btn btn-sm btn-ghost" id="ac-override-clear" hidden>Clear Override</button>
        </div>
        <div id="ac-last-decision" class="text-sm text-muted" style="margin-top:0.5rem"></div>
      </div>
    </div>
    <!-- System Status (Health Check) -->
    <div style="margin-top:1.5rem">
      <div class="job-card">
        <div class="job-card__header">
          <div class="job-card__title">
            <span class="status-pill status-pill--done">SYSTEM</span>
            <span class="text-muted text-sm">Health Check</span>
          </div>
        </div>
        <div id="health-status" style="margin-top:0.5rem"><span class="spinner"></span> Checking...</div>
      </div>
    </div>
  </main>

  <script src="/static/app.js?v=0.35.0"></script>
  <script src="/static/js/active-ops-poller.js?v=0.35.0"></script>
  <script src="/static/js/live-banner.js?v=0.35.0"></script>
  <script src="/static/js/pipeline-card.js?v=0.35.0"></script>
  <script src="/static/js/active-ops-hub.js?v=0.35.0"></script>
  <script>
  (function () {
    var mount = document.getElementById('active-ops-hub-mount');
    if (mount && typeof window.mountActiveOpsHub === 'function') {
      window.mountActiveOpsHub(mount);
    }
  })();
  </script>
  <script>
    // v0.33.0: mount the canonical Pipeline card on Status. The
    // module owns its own polling (30s) so we don't have to wire
    // it into the page's existing poll() loop.
    if (typeof window.mountPipelineCard === 'function') {
      window.mountPipelineCard(
        document.getElementById('pipeline-card-mount'),
        { compact: false, pollMs: 30000 }
      );
    }
  </script>
  <script>
  (function () {
    var pollTimer = null;
    var lastData  = null;

    // ── Polling ───────────────────────────────────────────────────────────
    async function updatePipelineStats() {
      try {
        var res = await fetch('/api/pipeline/stats');
        if (!res.ok) return;
        var d = await res.json();
        var f = function(n) { return n == null ? '?' : n.toLocaleString(); };
        document.getElementById('ps-scanned').textContent    = f(d.scanned) + ' scanned';
        document.getElementById('ps-pending').textContent    = f(d.pending_conversion) + ' pending';
        document.getElementById('ps-failed').textContent     = f(d.failed) + ' failed';
        document.getElementById('ps-unrecognized').textContent = f(d.unrecognized) + ' unrecognized';
        document.getElementById('ps-panalysis').textContent  = f(d.pending_analysis) + ' pending analysis';
        document.getElementById('ps-batched').textContent    = f(d.batched_for_analysis) + ' batched';
        document.getElementById('ps-afailed').textContent    = f(d.analysis_failed) + ' analysis failed';
        document.getElementById('ps-indexed').textContent    = f(d.in_search_index) + ' indexed';
      } catch(e) { /* non-critical */ }
    }

    async function poll() {
      try {
        var res = await fetch('/api/admin/active-jobs');
        if (!res.ok) return;
        lastData = await res.json();
        renderAll(lastData);
      } catch (e) { /* ignore */ }

      // v0.33.0: removed the standalone /api/scanner/progress poll
      // for the lifecycle card. Pipeline state now flows through
      // the canonical pipeline-card.js module (mounted in
      // #pipeline-card-mount), which polls /api/pipeline/status
      // on its own 30s cadence. Active Jobs section above still
      // renders per-file scan progress via active-jobs above.

      updatePipelineStats();
    }

    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(poll, document.hidden ? 30000 : 3000);
    }

    document.addEventListener('visibilitychange', function () {
      startPolling();
      if (!document.hidden) poll();
    });

    // ── Render ────────────────────────────────────────────────────────────
    function renderAll(data) {
      var container  = document.getElementById('jobs-container');
      var subtitle   = document.getElementById('status-subtitle');
      var stopBtn    = document.getElementById('stop-all-btn');
      var stopBanner = document.getElementById('stop-banner');

      // Stop state
      stopBanner.style.display = data.stop_requested ? 'flex' : 'none';
      stopBtn.disabled  = data.stop_requested;

      // Subtitle
      var running = data.running_count || 0;
      subtitle.textContent = running > 0
        ? running + ' job' + (running !== 1 ? 's' : '') + ' running'
        : 'No active jobs';

      // Job cards
      var jobs = data.bulk_jobs || [];
      if (!jobs.length) {
        container.innerHTML =
          '<div class="job-card job-card--empty">' +
            '<p class="text-muted" style="text-align:center;padding:2rem 0">' +
              'No active jobs. Everything is quiet.' +
            '</p>' +
          '</div>';
        return;
      }

      container.innerHTML = jobs.map(renderJobCard).join('');
      wireJobButtons(container);
      restoreOpenPanels(container);
    }

    function renderJobCard(job) {
      var pct    = job.total_files ? Math.round(job.converted / job.total_files * 100) : 0;
      var pctStr = job.total_files ? pct + '%' : '?%';
      var isActive = job.status === 'running' || job.status === 'scanning';
      var isPaused = job.status === 'paused';

      var workers = '';
      if ((job.current_files || []).length) {
        workers =
          '<div class="job-card__workers">' +
          job.current_files.map(function (w) {
            return '<div class="job-card__worker-row">' +
              '<span class="job-card__worker-id">Worker ' + w.worker_id + '</span>' +
              '<span class="mono text-sm">' + esc(w.filename) + '</span>' +
            '</div>';
          }).join('') +
          '</div>';
      }

      var actions = '';
      if (isActive) {
        actions =
          '<div class="job-card__actions">' +
            '<button class="btn btn-sm btn-ghost" data-pause="' + job.job_id + '">Pause</button>' +
            '<button class="btn btn-sm btn-danger-outline" data-cancel="' + job.job_id + '">Stop</button>' +
          '</div>';
      } else if (isPaused) {
        actions =
          '<div class="job-card__actions">' +
            '<button class="btn btn-sm btn-primary" data-resume="' + job.job_id + '">Resume</button>' +
            '<button class="btn btn-sm btn-danger-outline" data-cancel="' + job.job_id + '">Stop</button>' +
          '</div>';
      }

      var dirStats = '';
      if (job.dir_stats && Object.keys(job.dir_stats).length) {
        dirStats =
          '<details class="job-card__dir-details">' +
            '<summary>Directory Progress</summary>' +
            '<div class="job-card__dir-list">' +
            Object.keys(job.dir_stats).map(function (dir) {
              var s = job.dir_stats[dir];
              return '<div class="job-card__dir-row">' +
                '<span class="mono text-sm">' + esc(dir) + '/</span>' +
                '<span class="job-card__dir-counts">' +
                  '<span class="text-ok">' + (s.converted || 0) + ' done</span>' +
                  (s.failed ? '<span class="text-err">' + s.failed + ' failed</span>' : '') +
                '</span>' +
              '</div>';
            }).join('') +
            '</div>' +
          '</details>';
      }

      // v0.32.1: scanning UX fix. Before total_files is set the
      // bulk_scanner is still enumerating; showing "0 / ? files \u2014
      // ?%" looked broken. Show "Enumerating source files..." plus
      // an elapsed-time hint, and surface a warning if the scan has
      // been in this state for >2 min with no heartbeat (likely
      // stuck \u2014 operator should Stop and retry).
      //
      // v0.32.7: simplified to just `status === 'scanning'`. The
      // backend's `_scanning` flag is the authoritative signal \u2014
      // it's True for the entire BulkScanner.scan() call, then
      // flipped False right before update_bulk_job_status(...,
      // 'running', total_files=...). Previous condition required
      // `total_files == null` which was never the case (total_files
      // is always 0 during scan because _total_pending is only set
      // after scan completes), so the enumerating UI never rendered
      // and operators saw "0 / ? files \u2014 ?%" the whole time.
      var enumerating = (job.status === 'scanning');
      // v0.32.9: scan-phase progress data (added to /api/admin/active-jobs
      // in the same release). When the BulkScanner is mid-walk and has
      // reported scan_progress events, surface the rich numbers
      // ("10,696 files scanned" + current file path) right on the
      // Status card \u2014 same data the dedicated Bulk Jobs page sees via
      // its SSE stream.
      var sp = job.scan_progress || { scanned: 0, total: 0, current_file: '' };
      var progressLine;
      var progressBarHtml;
      if (enumerating) {
        var startedAt = job.started_at ? new Date(job.started_at) : null;
        var elapsedSec = startedAt ? Math.round((Date.now() - startedAt.getTime()) / 1000) : 0;
        var stuck = (elapsedSec > 120 && (!job.last_heartbeat) && !sp.scanned);
        // Indeterminate bar during scan: solid track with a sliding
        // gradient. Replaces the legacy 0%-width fill which made the
        // card look frozen during the enumeration window.
        progressBarHtml =
          '<div class="job-card__progress job-card__progress--indeterminate">' +
            '<div class="job-card__progress-fill"></div>' +
          '</div>';
        // Scanned-count + current-file display when the scanner has
        // reported any progress; falls back to the elapsed-time spinner
        // before the first scan_progress event lands.
        if (sp.scanned > 0) {
          var countStr = sp.total > 0
            ? sp.scanned.toLocaleString() + ' / ' + sp.total.toLocaleString() + ' files scanned'
            : sp.scanned.toLocaleString() + ' files scanned';
          progressLine =
            '<div style="font-size:0.82rem;color:var(--mf-color-text-muted)">' +
              '<span class="spinner" style="margin-right:0.4rem"></span>' +
              'Scanning source files \u2014 ' + countStr +
              ' \u2014 ' + fmtDur(elapsedSec) + ' elapsed' +
            '</div>' +
            (sp.current_file
              ? '<div class="text-sm mono text-muted" style="margin-top:0.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
                  + esc(sp.current_file) +
                '</div>'
              : '');
        } else {
          progressLine =
            '<div style="font-size:0.82rem;color:var(--mf-color-text-muted)">' +
              (stuck
                ? '<span style="color:#fbbf24">\u26a0 Enumerating &mdash; stuck? ' +
                  'No progress for ' + fmtDur(elapsedSec) + '. ' +
                  'Stop the job and retry, or check the log viewer.</span>'
                : '<span class="spinner" style="margin-right:0.4rem"></span>' +
                  'Enumerating source files\u2026 ' + fmtDur(elapsedSec) + ' elapsed') +
            '</div>';
        }
      } else {
        progressBarHtml =
          '<div class="job-card__progress">' +
            '<div class="job-card__progress-fill" style="width:' + pct + '%"></div>' +
          '</div>';
        progressLine =
          '<div style="font-size:0.82rem;color:var(--mf-color-text-muted)">' +
            job.converted.toLocaleString() + ' / ' + (job.total_files || '?').toLocaleString() + ' files \u2014 ' + pctStr +
          '</div>';
      }

      // v0.32.9: progress region wrapped in a click-through link to the
      // dedicated Bulk Jobs page, scrolled to / centered on this job.
      // Operators wanted "click on the card or progress bars and it
      // takes you to bulk jobs."
      var bulkUrl = '/bulk.html?job_id=' + encodeURIComponent(job.job_id);

      return '<div class="job-card' + (isActive ? ' job-card--active' : '') + '">' +
        '<div class="job-card__header">' +
          '<div>' +
            '<div class="job-card__title">' +
              // Pill is a clickable link to the log viewer with the
              // job_id seeded as the search query so operators can see
              // exactly what the scanner is doing.
              '<a href="/log-viewer.html?q=' + encodeURIComponent(job.job_id.slice(0,8)) + '&mode=history" ' +
                  'class="status-pill status-pill--' + job.status + ' status-pill--link" ' +
                  'title="Open log viewer filtered to this job ID">' +
                job.status.toUpperCase() + '</a>' +
              ' <span class="text-muted text-sm mono">' + job.job_id.slice(0, 8) + '\u2026</span>' +
              ' <a href="' + bulkUrl + '" class="job-card__open-link" title="Open this job in the Bulk Jobs page">\u2197 Open</a>' +
            '</div>' +
            '<div class="job-card__path">' + esc(job.display_source_path || job.source_path) + ' \u2192 ' + esc(job.display_output_path || job.output_path) + '</div>' +
          '</div>' +
          actions +
        '</div>' +
        '<a class="job-card__progress-link" href="' + bulkUrl + '" title="Open this job in the Bulk Jobs page">' +
          progressBarHtml +
          progressLine +
        '</a>' +
        '<div class="job-card__counts">' +
          '<span class="text-ok">\u2713 <span class="flp-counter cv-converted" data-flp-job="' + job.job_id + '" data-flp-status="converted" title="Click to view converted files">' + job.converted.toLocaleString() + '</span> converted</span>' +
          '<span class="text-err">\u2717 <span class="flp-counter cv-failed" data-flp-job="' + job.job_id + '" data-flp-status="failed" title="Click to view failed files">' + job.failed.toLocaleString() + '</span> failed</span>' +
          '<span class="text-muted">\u23ed <span class="flp-counter cv-skipped" data-flp-job="' + job.job_id + '" data-flp-status="skipped" title="Click to view skipped files">' + job.skipped.toLocaleString() + '</span> skipped</span>' +
        '</div>' +
        '<div class="file-list-panel" data-flp-panel="' + job.job_id + '"></div>' +
        workers +
        dirStats +
      '</div>';
    }

    // v0.33.0: removed renderLifecycle. The standalone Lifecycle
    // Scanner card was merged into the canonical Pipeline card
    // (mounted by pipeline-card.js in #pipeline-card-mount). Per
    // file scan progress for an in-flight scan is still visible
    // via the Active Jobs section above (renderAll()).

    // ── Wire job action buttons ───────────────────────────────────────────
    function wireJobButtons(container) {
      container.querySelectorAll('[data-pause]').forEach(function (btn) {
        btn.addEventListener('click', async function () {
          btn.disabled = true;
          try {
            await fetch('/api/bulk/jobs/' + btn.dataset.pause + '/pause', { method: 'POST' });
            showToast('Job paused');
            poll();
          } catch (e) { showToast('Failed to pause', 'error'); }
        });
      });

      container.querySelectorAll('[data-resume]').forEach(function (btn) {
        btn.addEventListener('click', async function () {
          btn.disabled = true;
          try {
            await fetch('/api/bulk/jobs/' + btn.dataset.resume + '/resume', { method: 'POST' });
            showToast('Job resumed');
            poll();
          } catch (e) { showToast('Failed to resume', 'error'); }
        });
      });

      container.querySelectorAll('[data-cancel]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var jobId = btn.dataset.cancel;
          var parent = btn.parentElement;
          // Replace with confirm row
          parent.innerHTML =
            '<span class="text-sm">Stop this job? </span>' +
            '<button class="btn btn-sm btn-danger" id="confirm-cancel-' + jobId + '">Yes, stop</button>' +
            '<button class="btn btn-sm btn-ghost" id="undo-cancel-' + jobId + '">No</button>';

          document.getElementById('confirm-cancel-' + jobId).addEventListener('click', async function () {
            try {
              await fetch('/api/bulk/jobs/' + jobId + '/cancel', { method: 'POST' });
              showToast('Job stopped');
              poll();
            } catch (e) { showToast('Failed to stop', 'error'); }
          });

          document.getElementById('undo-cancel-' + jobId).addEventListener('click', function () {
            poll(); // re-render restores buttons
          });
        });
      });
    }

    // ── STOP ALL ──────────────────────────────────────────────────────────
    document.getElementById('stop-all-btn').addEventListener('click', async function () {
      if (!confirm('Hard stop ALL running jobs? Workers will finish their current file and exit.')) return;
      var btn = this;
      btn.disabled = true;
      try {
        await fetch('/api/admin/stop-all', { method: 'POST' });
        showToast('Stop requested \u2014 jobs winding down');
        poll();
      } catch (e) {
        showToast('Failed to stop', 'error');
      }
      setTimeout(function () { btn.disabled = false; }, 3000);
    });

    // Reset stop
    document.getElementById('reset-stop-btn').addEventListener('click', async function () {
      var res = await fetch('/api/admin/reset-stop', { method: 'POST' });
      if (res.ok) {
        showToast('Stop flag cleared');
        // Hide the banner immediately — don't wait for the next poll cycle
        var banner = document.getElementById('stop-banner');
        if (banner) banner.style.display = 'none';
        document.getElementById('stop-all-btn').disabled = false;
        // Also clear the nav badge immediately
        if (typeof window.refreshStatusBadge === 'function') window.refreshStatusBadge();
        poll();
      } else {
        showToast('Reset failed — check logs', 'error');
      }
    });

    // ── Inline File List (clickable counters, per-card) ───────────────────
    // Map of job_id -> { status, page, total } for open panels.
    var _flpPanelsByJob = {};

    function clearElement(el) { while (el.firstChild) el.removeChild(el.firstChild); }

    function humanFileSize(bytes) {
      if (bytes == null || bytes === '') return '';
      var b = Number(bytes);
      if (b === 0) return '0 B';
      var units = ['B', 'KB', 'MB', 'GB'];
      var i = Math.min(Math.floor(Math.log(b) / Math.log(1024)), units.length - 1);
      var val = b / Math.pow(1024, i);
      return (i === 0 ? val : val.toFixed(1)) + ' ' + units[i];
    }

    function baseName(path) {
      if (!path) return '';
      var parts = path.replace(/\\/g, '/').split('/');
      return parts[parts.length - 1] || '';
    }

    function dirName(path) {
      if (!path) return '';
      var norm = path.replace(/\\/g, '/');
      var idx = norm.lastIndexOf('/');
      return idx >= 0 ? norm.slice(0, idx) : '';
    }

    function truncateStr(s, max) {
      if (!s || s.length <= max) return s || '';
      return s.slice(0, max - 1) + '\u2026';
    }

    function findPanel(jobId) {
      return document.querySelector('.file-list-panel[data-flp-panel="' + CSS.escape(jobId) + '"]');
    }

    async function toggleFileList(jobId, status) {
      var panel = findPanel(jobId);
      if (!panel) return;

      var state = _flpPanelsByJob[jobId];
      if (state && state.status === status) {
        // Clicking same counter collapses.
        panel.classList.remove('open');
        delete _flpPanelsByJob[jobId];
        return;
      }

      _flpPanelsByJob[jobId] = { status: status, page: 1, total: 0, lastCount: null };

      clearElement(panel);
      var loading = document.createElement('div');
      loading.className = 'flp-loading';
      loading.textContent = 'Loading ' + status + ' files\u2026';
      panel.appendChild(loading);
      panel.classList.add('open');

      await fetchAndRenderFileList(jobId, status, false);
    }

    async function fetchAndRenderFileList(jobId, status, append) {
      var panel = findPanel(jobId);
      if (!panel) return;
      var state = _flpPanelsByJob[jobId];
      if (!state) return;

      try {
        var data = await API.get('/api/bulk/jobs/' + encodeURIComponent(jobId) + '/files?status=' + encodeURIComponent(status) + '&page=' + state.page + '&per_page=50');
        state.total = data.total || 0;
        state.lastCount = data.total || 0;

        if (!append) {
          clearElement(panel);
          renderFileListPanel(panel, data, jobId, status);
        } else {
          var tbody = panel.querySelector('tbody');
          if (tbody) appendFileRows(tbody, data.files, status);
          updateLoadMoreBtn(panel, data, jobId);
        }
      } catch (e) {
        if (!append) {
          clearElement(panel);
          var err = document.createElement('div');
          err.className = 'flp-loading';
          err.style.color = 'var(--mf-color-error)';
          err.textContent = 'Failed to load files: ' + (e.message || 'unknown error');
          panel.appendChild(err);
        }
      }
    }

    function renderFileListPanel(panel, data, jobId, status) {
      var state = _flpPanelsByJob[jobId] || { total: 0, page: 1 };

      var header = document.createElement('div');
      header.className = 'flp-header';

      var title = document.createElement('span');
      title.className = 'flp-title';
      var statusColors = { converted: 'var(--mf-color-success)', failed: 'var(--mf-color-error)', skipped: 'var(--mf-color-text-muted)' };
      title.style.color = statusColors[status] || 'var(--mf-color-text)';
      title.textContent = status.charAt(0).toUpperCase() + status.slice(1) + ' Files (' + (state.total || 0).toLocaleString() + ')';
      header.appendChild(title);

      var closeBtn = document.createElement('button');
      closeBtn.className = 'flp-close';
      closeBtn.textContent = '\u00d7';
      closeBtn.title = 'Close';
      closeBtn.addEventListener('click', function () {
        panel.classList.remove('open');
        delete _flpPanelsByJob[jobId];
      });
      header.appendChild(closeBtn);
      panel.appendChild(header);

      if (!data.files || data.files.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'flp-loading';
        empty.textContent = 'No ' + status + ' files.';
        panel.appendChild(empty);
        return;
      }

      var scroll = document.createElement('div');
      scroll.className = 'flp-scroll';

      var table = document.createElement('table');
      table.className = 'flp-table';

      var thead = document.createElement('thead');
      var headRow = document.createElement('tr');
      var cols = ['Filename', 'Path', 'Size'];
      if (status === 'failed') cols.push('Error');
      cols.forEach(function (col) {
        var th = document.createElement('th');
        th.textContent = col;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      appendFileRows(tbody, data.files, status);
      table.appendChild(tbody);

      scroll.appendChild(table);
      panel.appendChild(scroll);

      if (data.total_pages > 1 && state.page < data.total_pages) {
        var btn = document.createElement('button');
        btn.className = 'flp-load-more';
        var remaining = Math.max(0, state.total - data.files.length);
        btn.textContent = 'Load more (' + remaining.toLocaleString() + ' remaining)';
        btn.addEventListener('click', async function () {
          btn.disabled = true;
          btn.textContent = 'Loading\u2026';
          var s = _flpPanelsByJob[jobId];
          if (!s) return;
          s.page++;
          await fetchAndRenderFileList(jobId, s.status, true);
        });
        panel.appendChild(btn);
      }
    }

    function appendFileRows(tbody, files, status) {
      (files || []).forEach(function (f) {
        var tr = document.createElement('tr');

        var tdName = document.createElement('td');
        tdName.className = 'flp-fname';
        var fname = baseName(f.source_path);
        tdName.textContent = truncateStr(fname, 60);
        tdName.title = fname;
        tr.appendChild(tdName);

        var tdPath = document.createElement('td');
        tdPath.className = 'flp-path';
        var dname = dirName(f.source_path);
        tdPath.textContent = truncateStr(dname, 60);
        tdPath.title = dname;
        tr.appendChild(tdPath);

        var tdSize = document.createElement('td');
        tdSize.className = 'flp-size';
        tdSize.textContent = humanFileSize(f.file_size_bytes);
        tr.appendChild(tdSize);

        if (status === 'failed') {
          var tdErr = document.createElement('td');
          tdErr.className = 'flp-err';
          var errText = truncateStr(f.error_msg || '', 120);
          tdErr.textContent = errText;
          tdErr.title = f.error_msg || '';
          tr.appendChild(tdErr);
        }

        tbody.appendChild(tr);
      });
    }

    function updateLoadMoreBtn(panel, data, jobId) {
      var state = _flpPanelsByJob[jobId];
      if (!state) return;
      var existing = panel.querySelector('.flp-load-more');
      if (!existing) return;
      if (state.page >= data.total_pages) {
        existing.remove();
      } else {
        var shown = state.page * 50;
        var remaining = Math.max(0, state.total - shown);
        existing.textContent = 'Load more (' + remaining.toLocaleString() + ' remaining)';
        existing.disabled = false;
      }
    }

    // After every re-render of the jobs container, restore any panels that were open.
    // Also prune state for jobs that disappeared.
    function restoreOpenPanels(container) {
      var liveJobIds = {};
      container.querySelectorAll('[data-flp-panel]').forEach(function (p) {
        liveJobIds[p.getAttribute('data-flp-panel')] = true;
      });
      // Drop stale state.
      Object.keys(_flpPanelsByJob).forEach(function (jobId) {
        if (!liveJobIds[jobId]) delete _flpPanelsByJob[jobId];
      });
      // Re-open any panels whose state persisted. The new panel elements are empty
      // after innerHTML wipe. To preserve pagination position (user scrolled to
      // page 3 shouldn't get snapped to page 1 every 3s), read the current
      // counter value from the DOM and compare against state.lastCount:
      //   - If unchanged AND user was on page > 1: re-fetch pages 1..page
      //     sequentially and append, restoring the full scroll-through.
      //   - If changed, or on page 1: single fetch of current page (status quo).
      Object.keys(_flpPanelsByJob).forEach(function (jobId) {
        var state = _flpPanelsByJob[jobId];
        var panel = findPanel(jobId);
        if (!panel) return;
        panel.classList.add('open');

        // Read current count from the counter span that this panel tracks.
        var currentCount = null;
        var counterEl = container.querySelector(
          '.flp-counter[data-flp-job="' + CSS.escape(jobId) + '"][data-flp-status="' + CSS.escape(state.status) + '"]'
        );
        if (counterEl) {
          var parsed = parseInt((counterEl.textContent || '').replace(/[^0-9]/g, ''), 10);
          if (!isNaN(parsed)) currentCount = parsed;
        }

        var countUnchanged = (state.lastCount != null && currentCount === state.lastCount);
        var targetPage = state.page;

        if (countUnchanged && targetPage > 1) {
          // Preserve pagination: re-fetch all pages 1..targetPage and append.
          (async function () {
            state.page = 1;
            await fetchAndRenderFileList(jobId, state.status, false);
            for (var p = 2; p <= targetPage; p++) {
              state.page = p;
              await fetchAndRenderFileList(jobId, state.status, true);
            }
          })();
        } else {
          // Count changed (or page==1): refresh page 1.
          state.page = 1;
          fetchAndRenderFileList(jobId, state.status, false);
        }
      });
    }

    // Event delegation on the jobs container — survives every re-render.
    document.getElementById('jobs-container').addEventListener('click', function (e) {
      var t = e.target;
      if (t && t.classList && t.classList.contains('flp-counter')) {
        var jobId = t.getAttribute('data-flp-job');
        var status = t.getAttribute('data-flp-status');
        if (jobId && status) toggleFileList(jobId, status);
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────
    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function fmtDur(s) {
      if (s < 60) return s + 's';
      if (s < 3600) return Math.round(s / 60) + 'm';
      var h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
      return m ? h + 'h ' + m + 'm' : h + 'h';
    }

    // ── Init ──────────────────────────────────────────────────────────────
    poll();
    startPolling();
  })();

  // ── Auto-Conversion Override ────────────────────────────────────────────
  (function () {
    async function loadAutoConvertStatus() {
      try {
        var res = await fetch('/api/auto-convert/status');
        if (!res.ok) return;
        var data = await res.json();

        var modeLabel = document.getElementById('ac-mode-label');
        var clearBtn  = document.getElementById('ac-override-clear');
        var select    = document.getElementById('ac-override-select');

        if (data.override_active) {
          modeLabel.textContent = 'Override: ' + data.mode_override + ' (expires ' + data.override_expiry + ')';
          modeLabel.style.color = 'var(--mf-color-warn)';
          clearBtn.hidden = false;
          select.value = data.mode_override;
        } else {
          modeLabel.textContent = 'Mode: ' + (data.configured_mode || 'off');
          modeLabel.style.color = '';
          clearBtn.hidden = true;
          select.value = '';
        }

        if (data.last_decision) {
          document.getElementById('ac-last-decision').textContent =
            'Last: ' + data.last_decision.reason;
        }
      } catch (e) {
        document.getElementById('ac-mode-label').textContent = 'unavailable';
      }
    }

    document.getElementById('ac-override-apply').addEventListener('click', async function () {
      var mode = document.getElementById('ac-override-select').value;
      var duration = parseInt(document.getElementById('ac-override-duration').value);
      if (!mode) { showToast('Select a mode to override', 'info'); return; }
      try {
        var res = await fetch('/api/auto-convert/override', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: mode, duration_minutes: duration }),
        });
        if (res.ok) {
          showToast('Mode override set: ' + mode + ' for ' + duration + ' min');
          loadAutoConvertStatus();
        } else {
          var err = await res.json();
          showToast(err.detail || 'Override failed', 'error');
        }
      } catch (e) { showToast('Override failed', 'error'); }
    });

    document.getElementById('ac-override-clear').addEventListener('click', async function () {
      try {
        var res = await fetch('/api/auto-convert/override', { method: 'DELETE' });
        if (res.ok) {
          showToast('Mode override cleared');
          loadAutoConvertStatus();
        }
      } catch (e) { showToast('Failed to clear override', 'error'); }
    });

    loadAutoConvertStatus();
    setInterval(loadAutoConvertStatus, 15000);
  })();

  // v0.33.0: removed the standalone Pending card loader. All of its
  // data (pending count, source-files total, last-scan stats,
  // last-auto-conversion status, next-scan time) is now rendered by
  // pipeline-card.js in the canonical Pipeline card above. The
  // pipeline pill chip-strip above also surfaces the pending count
  // with a click-through to /pipeline-files.html?status=pending for
  // the operator who wants to drill into the actual rows.

  // ── System Health Check ───────────────────────────────────────────────────
  (async function loadHealth() {
    try {
      var health = await API.get('/api/health');
      var comps = health.components || health;
      var container = document.getElementById('health-status');
      container.textContent = '';

      var table = document.createElement('table');
      table.className = 'data-table';
      Object.entries(comps).forEach(function(pair) {
        var dep = pair[0];
        var s = pair[1];
        var tr = document.createElement('tr');

        var tdName = document.createElement('td');
        tdName.textContent = dep;
        tr.appendChild(tdName);

        var tdStatus = document.createElement('td');
        var span = document.createElement('span');
        span.className = s.ok ? 'status-ok' : 'status-error';
        span.textContent = s.ok ? 'OK' : 'FAIL';
        tdStatus.appendChild(span);
        tr.appendChild(tdStatus);

        var tdDetail = document.createElement('td');
        tdDetail.className = 'text-sm text-muted';
        tdDetail.textContent = s.version || s.error || (s.free_gb != null ? s.free_gb + ' GB free' : '');
        tr.appendChild(tdDetail);

        table.appendChild(tr);
      });
      container.appendChild(table);
    } catch(e) {
      var el = document.getElementById('health-status');
      el.textContent = '';
      var err = document.createElement('span');
      err.className = 'status-error';
      err.textContent = 'Could not reach server.';
      el.appendChild(err);
    }
  })();
  </script>
