<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Management — MarkFlow</title>
  <link rel="stylesheet" href="/static/markflow.css">
  <style>
    .bm-topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--bg-secondary, #1a1a2e);
      border-radius: var(--radius, 8px);
      margin-bottom: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bm-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .bm-status .dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 50%;
      background: var(--ok, #16a34a);
    }
    .bm-status.paused .dot { background: var(--warn, #d97706); }
    .bm-counts {
      margin-left: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted, #aaa);
      align-items: center;
    }
    .bm-count-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      padding: 0.3em 0.65em;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .bm-count-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border, #2b2b3f); }
    .bm-count-btn strong { color: var(--text, #eee); margin-left: 0.25em; }
    .bm-count-btn.active {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.45);
      color: var(--text, #eee);
    }
    .bm-count-btn.active strong { color: #bfdbfe; }
    .bm-clear-filter {
      padding: 0.3em 0.65em;
      font-size: 0.78rem;
      background: transparent;
      color: var(--text-muted, #aaa);
      border: 1px dashed var(--border, #2b2b3f);
      border-radius: 999px;
      cursor: pointer;
    }
    .bm-clear-filter:hover { color: var(--text, #eee); border-style: solid; }
    .bm-filter-banner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.9rem;
      margin-bottom: 0.75rem;
      background: rgba(96,165,250,0.08);
      border: 1px solid rgba(96,165,250,0.25);
      border-radius: var(--radius, 8px);
      font-size: 0.85rem;
      color: var(--text, #eee);
    }
    .bm-loadmore {
      margin-top: 0.75rem;
      display: flex;
      justify-content: center;
    }
    /* Pause duration menu (v0.30.0) */
    .bm-pause-wrap { position: relative; display: inline-block; }
    .bm-pause-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 0.3rem;
      min-width: 220px;
      padding: 0.3rem 0;
      background: var(--surface, #161624);
      border: 1px solid var(--border, #2b2b3f);
      border-radius: var(--radius-sm, 4px);
      box-shadow: var(--shadow-lg, 0 8px 24px rgba(0,0,0,0.5));
      z-index: 50;
      font-size: 0.88rem;
    }
    .bm-pause-menu[hidden] { display: none; }
    .bm-pause-menu .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem;
      color: var(--text, #eee);
      cursor: pointer;
      user-select: none;
    }
    .bm-pause-menu .item:hover { background: rgba(96,165,250,0.12); }
    .bm-pause-menu .item .sub {
      color: var(--text-muted, #aaa);
      font-size: 0.78rem;
      font-family: ui-monospace, monospace;
    }
    .bm-pause-menu .sep {
      height: 1px;
      margin: 0.3rem 0.3rem;
      background: var(--border, #2b2b3f);
    }
    .bm-pause-until-label {
      color: var(--text-muted, #aaa);
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }
    /* Circuit-breaker banner (v0.29.9) */
    .bm-cb-banner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      margin-bottom: 0.75rem;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.45);
      border-radius: var(--radius, 8px);
      color: #fca5a5;
      font-size: 0.9rem;
    }
    .bm-cb-banner[data-status="half_open"] {
      background: rgba(217,119,6,0.12);
      border-color: rgba(217,119,6,0.45);
      color: #fcd34d;
    }
    .bm-cb-banner strong { color: inherit; }
    .bm-cb-banner .bm-cb-detail {
      flex: 1;
      min-width: 260px;
      opacity: 0.9;
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
    }
    .bm-cb-banner button {
      background: rgba(255,255,255,0.08);
      border: 1px solid currentColor;
      color: inherit;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius-sm, 4px);
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
    }
    .bm-cb-banner button:hover { background: rgba(255,255,255,0.15); }
    /* Context menu (v0.29.5) */
    .bm-ctx {
      position: fixed;
      z-index: 200;
      min-width: 220px;
      padding: 0.3rem 0;
      background: var(--surface, #161624);
      border: 1px solid var(--border, #2b2b3f);
      border-radius: var(--radius-sm, 4px);
      box-shadow: var(--shadow-lg, 0 8px 24px rgba(0,0,0,0.5));
      font-size: 0.88rem;
      animation: bm-ctx-in 0.08s ease-out;
    }
    @keyframes bm-ctx-in {
      from { opacity: 0; transform: translateY(-3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bm-ctx-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.85rem;
      color: var(--text, #eee);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .bm-ctx-item:hover,
    .bm-ctx-item.active {
      background: rgba(96,165,250,0.12);
    }
    .bm-ctx-item[aria-disabled="true"] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .bm-ctx-icon {
      width: 1.1rem;
      text-align: center;
      color: var(--text-muted, #aaa);
      font-size: 0.95rem;
    }
    .bm-ctx-sep {
      height: 1px;
      margin: 0.3rem 0.3rem;
      background: var(--border, #2b2b3f);
    }
    /* Analysis-result modal (v0.29.5) */
    .bm-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bm-modal {
      background: var(--surface, #161624);
      border: 1px solid var(--border, #2b2b3f);
      border-radius: var(--radius, 8px);
      max-width: min(720px, 92vw);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .bm-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #2b2b3f);
    }
    .bm-modal-head strong { font-size: 1rem; }
    .bm-modal-body {
      padding: 1rem;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .bm-modal-section {
      margin-bottom: 1rem;
    }
    .bm-modal-section h4 {
      margin: 0 0 0.35rem 0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted, #aaa);
    }
    .bm-modal-kv {
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      word-break: break-all;
      color: var(--text-muted, #aaa);
    }
    .bm-modal-text {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.03);
      padding: 0.55rem 0.7rem;
      border-radius: var(--radius-sm, 4px);
      line-height: 1.45;
    }
    .bm-modal-err {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.35);
      color: #fca5a5;
      padding: 0.55rem 0.7rem;
      border-radius: var(--radius-sm, 4px);
      white-space: pre-wrap;
    }
    .bm-modal-close {
      background: none;
      border: none;
      color: var(--text-muted, #aaa);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0 0.3rem;
    }
    .bm-card {
      border: 1px solid var(--border, #2b2b3f);
      border-radius: var(--radius, 8px);
      margin-bottom: 0.75rem;
      background: var(--surface, #161624);
      overflow: hidden;
    }
    .bm-card-header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .bm-card-header:hover { background: rgba(255,255,255,0.03); }
    .bm-card-header .caret {
      display: inline-block;
      width: 0.6rem;
      transition: transform 0.15s;
    }
    .bm-card.open .caret { transform: rotate(90deg); }
    .bm-card-body { display: none; padding: 0 1rem 1rem 1rem; }
    .bm-card.open .bm-card-body { display: block; }
    .bm-pill {
      display: inline-block;
      padding: 0.1em 0.55em;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .bm-pill.batched { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .bm-pill.completed { background: rgba(22,163,74,0.15); color: #4ade80; }
    .bm-pill.failed { background: rgba(220,38,38,0.15); color: #f87171; }
    .bm-pill.mixed { background: rgba(217,119,6,0.15); color: #fbbf24; }
    .bm-pill.excluded { background: rgba(120,120,120,0.15); color: #aaa; }
    .bm-bulkbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--text-muted, #aaa);
    }
    .bm-file-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .bm-file-table th, .bm-file-table td {
      padding: 0.45rem 0.6rem;
      text-align: left;
      border-bottom: 1px solid var(--border, #2b2b3f);
      vertical-align: middle;
    }
    .bm-file-table th { font-size: 0.75rem; color: var(--text-muted, #aaa); text-transform: uppercase; }
    .bm-file-table td.path {
      max-width: 28ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-muted, #aaa);
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
    .bm-file-table a.filename {
      color: var(--link, #93c5fd);
      text-decoration: none;
      cursor: pointer;
    }
    .bm-file-table a.filename:hover { text-decoration: underline; }
    .bm-preview-tip {
      position: fixed;
      z-index: 100;
      max-width: 320px;
      max-height: 320px;
      padding: 0.25rem;
      background: #000;
      border: 1px solid var(--border, #2b2b3f);
      border-radius: var(--radius-sm, 4px);
      box-shadow: var(--shadow-lg, 0 8px 24px rgba(0,0,0,0.5));
      pointer-events: none;
    }
    .bm-preview-tip img { max-width: 300px; max-height: 300px; display: block; }
    .bm-empty {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--text-muted, #aaa);
    }
    .bm-loading { color: var(--text-muted, #aaa); padding: 0.5rem 0; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">MarkFlow</a>
    <div id="main-nav" class="nav-links"></div>
  </nav>

  <main class="container page-content">
    <div id="error-banner" role="alert" hidden></div>

    <h1>Batch Management</h1>
    <p class="text-muted text-sm">Review and manage analysis queue batches. Pause batch submission, cancel pending rows, or exclude individual files from analysis.</p>

    <div id="bm-cb-banner-slot"></div>

    <div class="bm-topbar">
      <div id="bm-status" class="bm-status">
        <span class="dot"></span>
        <span id="bm-status-label">Submission: loading...</span>
      </div>
      <div class="bm-pause-wrap">
        <button id="bm-pause" class="btn btn-sm" type="button" aria-haspopup="true">Pause ▾</button>
        <div id="bm-pause-menu" class="bm-pause-menu" role="menu" hidden></div>
      </div>
      <button id="bm-resume" class="btn btn-sm" type="button" hidden>Resume</button>
      <button id="bm-cancel-all" class="btn btn-ghost btn-sm" type="button">Cancel All Pending</button>
      <button id="bm-bulk-reanalyze" class="btn btn-ghost btn-sm" type="button" title="Re-analyze multiple rows by date / provider / model. Uses LLM tokens.">Bulk re-analyze...</button>
      <button id="bm-refresh" class="btn btn-ghost btn-sm" type="button">Refresh</button>
      <div class="bm-counts" id="bm-counts"></div>
    </div>

    <div id="bm-batches"></div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    (function(){
      'use strict';

      const statusEl = document.getElementById('bm-status');
      const statusLabel = document.getElementById('bm-status-label');
      const pauseBtn = document.getElementById('bm-pause');
      const pauseMenu = document.getElementById('bm-pause-menu');
      const resumeBtn = document.getElementById('bm-resume');
      const cancelBtn = document.getElementById('bm-cancel-all');
      const bulkReanalyzeBtn = document.getElementById('bm-bulk-reanalyze');
      const refreshBtn = document.getElementById('bm-refresh');
      const countsEl = document.getElementById('bm-counts');
      const batchesEl = document.getElementById('bm-batches');

      let paused = false;
      let pauseUntil = null;  // ISO string or null
      let previewTip = null;
      let previewTimer = null;
      let activeStatusFilter = null;         // null | 'pending' | 'batched' | 'completed' | 'failed' | 'excluded'
      let lastCounts = {};                   // keeps the most recent /status counts for re-render
      const PENDING_BATCH_SENTINEL = '__pending__';
      const PENDING_PAGE_SIZE = 100;

      function clearChildren(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      function setLoadingText(el, text) {
        clearChildren(el);
        const p = document.createElement('p');
        p.className = 'bm-loading';
        p.textContent = text;
        el.appendChild(p);
      }

      function fmtBytes(n) {
        if (typeof formatBytes === 'function') return formatBytes(n);
        if (n == null) return '—';
        if (n < 1024) return n + ' B';
        if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
        if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MB';
        return (n / 1073741824).toFixed(2) + ' GB';
      }

      function fmtDateTime(iso) {
        if (!iso) return '—';
        try {
          const d = typeof parseUTC === 'function' ? parseUTC(iso) : new Date(iso);
          if (!d || isNaN(d.getTime())) return String(iso);
          return d.toLocaleString();
        } catch (e) {
          return String(iso);
        }
      }

      const VALID_STATUSES = new Set(['batched', 'completed', 'failed', 'mixed', 'excluded', 'pending']);
      function safeStatus(s) { return VALID_STATUSES.has(s) ? s : 'mixed'; }

      function fmtMtime(mtime) {
        if (mtime == null) return '—';
        const d = new Date(mtime * 1000);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleDateString();
      }

      function basename(p) {
        if (!p) return '';
        const parts = String(p).split(/[\\/]/);
        return parts[parts.length - 1] || p;
      }

      function dirname(p) {
        if (!p) return '';
        const s = String(p);
        const idx = Math.max(s.lastIndexOf('/'), s.lastIndexOf('\\'));
        return idx > 0 ? s.substring(0, idx) : '';
      }

      function truncate(s, n) {
        if (!s) return '';
        return s.length > n ? '…' + s.substring(s.length - n + 1) : s;
      }

      function extOf(p) {
        const b = basename(p);
        const i = b.lastIndexOf('.');
        return i > 0 ? b.substring(i) : '';
      }

      function setStatus(pausedFlag, pauseUntilIso) {
        paused = !!pausedFlag;
        pauseUntil = pauseUntilIso || null;
        statusEl.classList.toggle('paused', paused);

        let label;
        if (!paused) {
          label = 'Submission: Running';
        } else if (pauseUntil) {
          label = 'Submission: Paused until ' + fmtDateTime(pauseUntil);
        } else {
          label = 'Submission: Paused (indefinite)';
        }
        statusLabel.textContent = label;

        // Pause / Resume button visibility — only one is interactive at a time.
        pauseBtn.hidden = paused;
        resumeBtn.hidden = !paused;
      }

      function renderCounts(counts) {
        counts = counts || {};
        lastCounts = counts;
        clearChildren(countsEl);
        const order = ['pending', 'batched', 'completed', 'failed', 'excluded'];
        const labels = {
          pending: 'Pending', batched: 'Batched',
          completed: 'Completed', failed: 'Failed', excluded: 'Excluded'
        };
        order.forEach(k => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'bm-count-btn' + (activeStatusFilter === k ? ' active' : '');
          btn.setAttribute('aria-pressed', activeStatusFilter === k ? 'true' : 'false');
          btn.title = 'Click to filter by ' + labels[k].toLowerCase();
          btn.appendChild(document.createTextNode(labels[k] + ':'));
          const strong = document.createElement('strong');
          strong.textContent = String(counts[k] != null ? counts[k] : 0);
          btn.appendChild(strong);
          btn.addEventListener('click', () => setStatusFilter(k === activeStatusFilter ? null : k));
          countsEl.appendChild(btn);
        });
        if (activeStatusFilter) {
          const clr = document.createElement('button');
          clr.type = 'button';
          clr.className = 'bm-clear-filter';
          clr.textContent = 'Show all';
          clr.addEventListener('click', () => setStatusFilter(null));
          countsEl.appendChild(clr);
        }
      }

      function setStatusFilter(status) {
        activeStatusFilter = status;
        renderCounts(lastCounts);
        loadBatches();
      }

      async function refreshStatus() {
        const data = await API.get('/api/analysis/status');
        setStatus(data.paused, data.pause_until);
        renderCounts(data.counts);
        // v0.29.9: check circuit breaker state in parallel with /status.
        // Don't await this — breaker state is secondary and we don't want
        // a 503 here to block the main counts refresh.
        refreshCircuitBreaker().catch(() => { /* silent — handled in fn */ });
      }

      async function refreshCircuitBreaker() {
        try {
          const cb = await API.get('/api/analysis/circuit-breaker');
          renderCircuitBreakerBanner(cb);
        } catch (e) {
          // If the endpoint itself is unreachable, hide the banner
          // rather than show stale state.
          const slot = document.getElementById('bm-cb-banner-slot');
          if (slot) clearChildren(slot);
        }
      }

      function renderCircuitBreakerBanner(cb) {
        const slot = document.getElementById('bm-cb-banner-slot');
        if (!slot) return;
        clearChildren(slot);

        const status = cb && cb.status;
        if (status !== 'open' && status !== 'half_open') return;

        const banner = document.createElement('div');
        banner.className = 'bm-cb-banner';
        banner.setAttribute('data-status', status);
        banner.setAttribute('role', 'alert');

        const label = document.createElement('strong');
        label.textContent = status === 'half_open'
          ? 'Vision API: half-open (trial call in flight)'
          : 'Vision API circuit breaker: open';
        banner.appendChild(label);

        const detail = document.createElement('div');
        detail.className = 'bm-cb-detail';
        const parts = [];
        if (cb.last_error_class) parts.push('Last error: ' + cb.last_error_class);
        if (cb.consecutive_failures != null && cb.consecutive_failures > 0) {
          parts.push(cb.consecutive_failures + ' consecutive upstream failures');
        }
        if (status === 'open' && cb.cooldown_remaining_s != null && cb.cooldown_remaining_s > 0) {
          parts.push('Retrying in ' + Math.ceil(cb.cooldown_remaining_s) + 's');
        }
        detail.textContent = parts.join(' · ') || 'Analysis submission paused automatically until cooldown elapses.';
        banner.appendChild(detail);

        const resetBtn = document.createElement('button');
        resetBtn.type = 'button';
        resetBtn.textContent = 'Reset breaker';
        resetBtn.addEventListener('click', async () => {
          if (!confirm('Manually reset the vision-API circuit breaker? New batches will be attempted on the next cycle.')) return;
          resetBtn.disabled = true;
          try {
            await API.post('/api/analysis/circuit-breaker/reset', {});
            if (typeof showToast === 'function') showToast('Circuit breaker reset');
            await refreshCircuitBreaker();
          } catch (e) {
            showError('Reset failed: ' + e.message);
          } finally {
            resetBtn.disabled = false;
          }
        });
        banner.appendChild(resetBtn);

        slot.appendChild(banner);
      }

      function hideError() {
        const banner = document.getElementById('error-banner');
        if (banner) {
          banner.hidden = true;
          banner.textContent = '';
        }
      }

      let pollFailCount = 0;
      async function pollTick() {
        if (document.hidden) {
          setTimeout(pollTick, 5000);
          return;
        }
        try {
          await refreshStatus();
          if (pollFailCount > 0) {
            hideError();
            pollFailCount = 0;
          }
        } catch (e) {
          pollFailCount++;
          if (pollFailCount === 1) {
            showError('Status update failed: ' + (e.message || 'network error'));
          }
          // quieter on subsequent failures — banner already up
        } finally {
          setTimeout(pollTick, 5000);
        }
      }

      function renderFilterBanner() {
        if (!activeStatusFilter) return null;
        const banner = document.createElement('div');
        banner.className = 'bm-filter-banner';
        const label = document.createElement('span');
        const total = lastCounts[activeStatusFilter] || 0;
        label.textContent = 'Filtering to ' + activeStatusFilter + ' files (' + total + ' total). Batches shown are those containing at least one ' + activeStatusFilter + ' file; file lists inside each batch are filtered the same way.';
        banner.appendChild(label);
        return banner;
      }

      async function loadBatches() {
        setLoadingText(batchesEl, 'Loading batches...');
        try {
          clearChildren(batchesEl);
          const banner = renderFilterBanner();
          if (banner) batchesEl.appendChild(banner);

          // 'Pending' files have batch_id=NULL so they're invisible to
          // /batches. Render them as a synthetic pseudo-batch card when
          // the pending filter is active.
          if (activeStatusFilter === 'pending') {
            batchesEl.appendChild(renderPendingPseudoBatch());
            return;
          }

          const qs = activeStatusFilter ? '?status=' + encodeURIComponent(activeStatusFilter) : '';
          const data = await API.get('/api/analysis/batches' + qs);
          const batches = (data && data.batches) || [];
          if (batches.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'bm-empty';
            empty.textContent = activeStatusFilter
              ? 'No batches contain any ' + activeStatusFilter + ' files right now.'
              : 'No analysis batches. Batches are created automatically after bulk conversion scans complete.';
            batchesEl.appendChild(empty);
            return;
          }
          batches.sort((a, b) => {
            const ax = a.earliest_batched_at || '';
            const bx = b.earliest_batched_at || '';
            return bx.localeCompare(ax);
          });
          batches.forEach(b => batchesEl.appendChild(renderBatchCard(b)));
        } catch (e) {
          clearChildren(batchesEl);
          showError('Failed to load batches: ' + e.message);
        }
      }

      function renderPendingPseudoBatch() {
        const total = lastCounts.pending || 0;
        const card = document.createElement('div');
        card.className = 'bm-card';
        card.dataset.batchId = PENDING_BATCH_SENTINEL;

        const header = document.createElement('div');
        header.className = 'bm-card-header';

        const caret = document.createElement('span');
        caret.className = 'caret';
        caret.textContent = '▶';
        header.appendChild(caret);

        const idSpan = document.createElement('strong');
        idSpan.textContent = 'Pending (not yet batched)';
        header.appendChild(idSpan);

        const countSpan = document.createElement('span');
        countSpan.textContent = total + ' file' + (total === 1 ? '' : 's');
        countSpan.className = 'text-muted';
        header.appendChild(countSpan);

        const pill = document.createElement('span');
        pill.className = 'bm-pill batched';
        pill.textContent = 'pending';
        header.appendChild(pill);

        const body = document.createElement('div');
        body.className = 'bm-card-body';

        header.addEventListener('click', () => {
          const wasOpen = card.classList.toggle('open');
          if (wasOpen && !body.dataset.loaded) {
            loadPendingFiles(body, 0);
          }
        });

        card.appendChild(header);
        card.appendChild(body);
        return card;
      }

      async function loadPendingFiles(container, offset) {
        if (offset === 0) {
          clearChildren(container);
          setLoadingText(container, 'Loading pending files...');
        }
        try {
          const url = '/api/analysis/pending-files?limit=' + PENDING_PAGE_SIZE + '&offset=' + offset;
          const data = await API.get(url);
          const files = (data && data.files) || [];
          const total = (data && data.total) || 0;
          const loaded = offset + files.length;

          if (offset === 0) {
            clearChildren(container);
            renderFileTable(PENDING_BATCH_SENTINEL, files, container);
            container.dataset.loaded = '1';
          } else {
            const tbody = container.querySelector('table.bm-file-table tbody');
            if (tbody) {
              // Drop the stale "No files" placeholder if present
              const placeholder = tbody.querySelector('tr td[colspan]');
              if (placeholder) tbody.removeChild(placeholder.parentNode);
              // Also extend the fileMap so newly-appended rows participate
              // in multi-select lookups.
              if (!tbody.__fileMap) tbody.__fileMap = new Map();
              files.forEach(f => {
                tbody.__fileMap.set(f.id, f);
                tbody.appendChild(renderFileRow(f, () => {}, tbody));
              });
            }
          }
          container.dataset.loadedCount = String(loaded);

          // (Re)render the Load-more footer
          const oldMore = container.querySelector('.bm-loadmore');
          if (oldMore) oldMore.parentNode.removeChild(oldMore);
          if (loaded < total) {
            const more = document.createElement('div');
            more.className = 'bm-loadmore';
            const btn = document.createElement('button');
            btn.className = 'btn btn-ghost btn-sm';
            btn.type = 'button';
            btn.textContent = 'Load more (' + loaded + ' of ' + total + ')';
            btn.addEventListener('click', () => loadPendingFiles(container, loaded));
            more.appendChild(btn);
            container.appendChild(more);
          } else if (total > 0) {
            const done = document.createElement('div');
            done.className = 'bm-loadmore text-muted text-sm';
            done.textContent = 'All ' + total + ' pending file' + (total === 1 ? '' : 's') + ' loaded.';
            container.appendChild(done);
          }
        } catch (e) {
          clearChildren(container);
          const err = document.createElement('p');
          err.className = 'text-muted';
          err.textContent = 'Failed to load pending files: ' + e.message;
          container.appendChild(err);
        }
      }

      function renderBatchCard(batch) {
        const card = document.createElement('div');
        card.className = 'bm-card';
        card.dataset.batchId = batch.batch_id;

        const header = document.createElement('div');
        header.className = 'bm-card-header';

        const caret = document.createElement('span');
        caret.className = 'caret';
        caret.textContent = '▶';
        header.appendChild(caret);

        const idSpan = document.createElement('strong');
        idSpan.textContent = (batch.batch_id || '').substring(0, 8);
        idSpan.style.fontFamily = 'ui-monospace, monospace';
        header.appendChild(idSpan);

        const countSpan = document.createElement('span');
        countSpan.textContent = batch.file_count + ' file' + (batch.file_count === 1 ? '' : 's');
        countSpan.className = 'text-muted';
        header.appendChild(countSpan);

        const sizeSpan = document.createElement('span');
        sizeSpan.textContent = fmtBytes(batch.total_size_bytes);
        sizeSpan.className = 'text-muted';
        header.appendChild(sizeSpan);

        const pill = document.createElement('span');
        pill.className = 'bm-pill ' + safeStatus(batch.status);
        pill.textContent = batch.status || 'mixed';
        header.appendChild(pill);

        const dateSpan = document.createElement('span');
        dateSpan.textContent = fmtDateTime(batch.earliest_batched_at);
        dateSpan.className = 'text-muted';
        dateSpan.style.marginLeft = 'auto';
        dateSpan.style.fontSize = '0.85rem';
        header.appendChild(dateSpan);

        const body = document.createElement('div');
        body.className = 'bm-card-body';

        header.addEventListener('click', () => {

      async function loadBatchFiles(batchId, container) {
        setLoadingText(container, 'Loading files...');
        try {
          const qs = (activeStatusFilter && activeStatusFilter !== 'pending')
            ? '?status=' + encodeURIComponent(activeStatusFilter) : '';
          const data = await API.get('/api/analysis/batches/' + encodeURIComponent(batchId) + '/files' + qs);
          clearChildren(container);
          const files = (data && data.files) || [];
          renderFileTable(batchId, files, container);
          container.dataset.loaded = '1';
        } catch (e) {
          clearChildren(container);
          const err = document.createElement('p');
          err.className = 'text-muted';
          err.textContent = 'Failed to load files: ' + e.message;
          container.appendChild(err);
        }
      }

      function renderFileTable(batchId, files, container) {
        const bar = document.createElement('div');
        bar.className = 'bm-bulkbar';
        const bulkBtn = document.createElement('button');
        bulkBtn.className = 'btn btn-ghost btn-sm';
        bulkBtn.type = 'button';
        bulkBtn.textContent = 'Exclude Selected';
        bulkBtn.disabled = true;
        bar.appendChild(bulkBtn);
        const dlBtn = document.createElement('button');
        dlBtn.className = 'btn btn-ghost btn-sm';
        dlBtn.type = 'button';
        dlBtn.textContent = 'Download Selected';
        dlBtn.disabled = true;
        bar.appendChild(dlBtn);
        const selInfo = document.createElement('span');
        selInfo.textContent = '0 selected';
        bar.appendChild(selInfo);
        container.appendChild(bar);

        const table = document.createElement('table');
        table.className = 'bm-file-table';

        const thead = document.createElement('thead');
        const hrow = document.createElement('tr');
        ['', 'Filename', 'Path', 'Size', 'Date', 'Type', 'Status', 'Action'].forEach(h => {
          const th = document.createElement('th');
          if (h === '') {
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.addEventListener('change', () => {
              table.querySelectorAll('tbody input.row-cb').forEach(x => { x.checked = cb.checked; });
              updateSel();
            });
            th.appendChild(cb);
          } else {
            th.textContent = h;
          }
          hrow.appendChild(th);
        });
        thead.appendChild(hrow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        // Stash a Map on the tbody so contextmenu handlers can recover the
        // full file object from a checkbox's entryId without passing the
        // whole array through every closure.
        tbody.__fileMap = new Map();
        files.forEach(f => tbody.__fileMap.set(f.id, f));

        if (files.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 8;
          td.style.textAlign = 'center';
          td.style.padding = '1rem';
          td.className = 'text-muted';
          td.textContent = 'No files in this batch.';
          tr.appendChild(td);
          tbody.appendChild(tr);
        } else {
          files.forEach(f => tbody.appendChild(renderFileRow(f, updateSel, tbody)));
        }
        table.appendChild(tbody);
        container.appendChild(table);

        function updateSel() {
          const checked = tbody.querySelectorAll('input.row-cb:checked');
          selInfo.textContent = checked.length + ' selected';
          bulkBtn.disabled = checked.length === 0;
          // Only enable Download Selected if every selected row has a
          // source_file_id (rows without one can't be downloaded).
          const selFiles = getSelectedFilesFromTbody(tbody);
          const downloadable = selFiles.filter(f => !!f.source_file_id);
          dlBtn.disabled = downloadable.length === 0;
          dlBtn.textContent = checked.length > 0
            ? 'Download Selected (' + downloadable.length + ')'
            : 'Download Selected';
        }

        dlBtn.addEventListener('click', () => {
          const sel = getSelectedFilesFromTbody(tbody).filter(f => !!f.source_file_id);
          downloadSelectedFiles(sel);
        });

        bulkBtn.addEventListener('click', async () => {
          const ids = Array.from(tbody.querySelectorAll('input.row-cb:checked'))
            .map(cb => cb.dataset.entryId)
            .filter(Boolean);
          if (ids.length === 0) return;
          if (!confirm('Exclude ' + ids.length + ' file(s) from analysis? They will not be submitted to the LLM.')) return;
          try {
            const r = await API.post('/api/analysis/exclude', { file_ids: ids });
            if (typeof showToast === 'function') showToast('Excluded ' + r.excluded + ' file(s)');
            await refreshStatus();
            await loadBatches();
          } catch (e) {
            showError('Exclude failed: ' + e.message);
          }
        });
      }

      // ── Multi-select helpers (v0.29.6) ───────────────────────────────
      // v0.31.4: server-side ZIP bundle replaces the sequential per-file
      // synthetic-anchor loop. Cap raised from 100 to 500 to match the
      // server-side limit. The server hard-caps at 500 files AND ~2 GB
      // uncompressed total content; whichever fires first returns 413.
      const DOWNLOAD_ALL_CAP = 500;

      function getSelectedFilesFromTbody(tbody) {
        if (!tbody || !tbody.__fileMap) return [];
        const out = [];
        tbody.querySelectorAll('input.row-cb:checked').forEach(cb => {
          const f = tbody.__fileMap.get(cb.dataset.entryId);
          if (f) out.push(f);
        });
        return out;
      }

      async function downloadSelectedFiles(files) {
        const downloadable = files.filter(f => !!f.source_file_id);
        if (downloadable.length === 0) {
          showError('None of the selected files are downloadable (source_file_id missing).');
          return;
        }
        if (downloadable.length > DOWNLOAD_ALL_CAP) {
          showError('Too many files selected (' + downloadable.length + '). Please select ' + DOWNLOAD_ALL_CAP + ' or fewer at a time.');
          return;
        }
        // v0.31.4: server-side ZIP bundle — single fetch instead of N
        // synthetic-anchor clicks. The server packages the files,
        // streams a ZIP, and the browser receives a single download
        // item. No more "allow multiple downloads" prompt.
        const single = downloadable.length === 1;
        const msg = single
          ? 'Download "' + basename(downloadable[0].source_path) + '"?'
          : 'Download ' + downloadable.length + ' files as a single ZIP bundle?\n\n' +
            'The server packages them; large bundles can take a few seconds to start.';
        if (!confirm(msg)) return;

        // Fast path for a single file: skip the bundle endpoint and use
        // the existing direct-download endpoint (faster + no zipping).
        if (single) {
          const f = downloadable[0];
          const url = '/api/analysis/files/' + encodeURIComponent(f.source_file_id) + '/download';
          triggerDownload(url, basename(f.source_path));
          if (typeof showToast === 'function') showToast('Download started');
          return;
        }

        const file_ids = downloadable.map(f => f.source_file_id);
        if (typeof showToast === 'function') {
          showToast('Building bundle of ' + downloadable.length + ' files - this may take a few seconds...');
        }
        try {
          const resp = await fetch('/api/analysis/files/download-bundle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ file_ids: file_ids }),
          });
          if (!resp.ok) {
            const detail = await resp.text().catch(() => '');
            throw new Error('HTTP ' + resp.status + (detail ? ': ' + detail.slice(0, 300) : ''));
          }
          const included = parseInt(resp.headers.get('X-MarkFlow-Bundle-Files-Included') || '0', 10);
          const skipped = parseInt(resp.headers.get('X-MarkFlow-Bundle-Files-Skipped') || '0', 10);
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const cd = resp.headers.get('Content-Disposition') || '';
          const m = cd.match(/filename="([^"]+)"/);
          a.download = m ? m[1] : 'markflow-files.zip';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          if (typeof showToast === 'function') {
            let toast = 'Downloaded bundle of ' + included + ' file' + (included === 1 ? '' : 's');
            if (skipped > 0) toast += ' (' + skipped + ' skipped - missing or unreadable)';
            showToast(toast);
          }
        } catch (e) {
          showError('Bundle download failed: ' + e.message);
        }
      }

      // ── Context menu (v0.29.5) ────────────────────────────────────────
      let openCtxMenu = null;

      function closeCtxMenu() {
        if (openCtxMenu && openCtxMenu.parentNode) {
          openCtxMenu.parentNode.removeChild(openCtxMenu);
        }
        openCtxMenu = null;
      }

      window.addEventListener('click', (ev) => {
        if (openCtxMenu && !openCtxMenu.contains(ev.target)) closeCtxMenu();
      });
      window.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') closeCtxMenu();
      });
      window.addEventListener('scroll', closeCtxMenu, true);
      window.addEventListener('resize', closeCtxMenu);

      function ctxItem(opts) {
        const item = document.createElement('div');
        item.className = 'bm-ctx-item';
        item.setAttribute('role', 'menuitem');
        item.setAttribute('tabindex', '0');
        if (opts.disabled) item.setAttribute('aria-disabled', 'true');

        const icon = document.createElement('span');
        icon.className = 'bm-ctx-icon';
        icon.textContent = opts.icon || '';
        item.appendChild(icon);

        const label = document.createElement('span');
        label.textContent = opts.label;
        item.appendChild(label);

        if (!opts.disabled && opts.onClick) {
          const fire = (ev) => {
            ev.stopPropagation();
            closeCtxMenu();
            opts.onClick();
          };
          item.addEventListener('click', fire);
          item.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter' || ev.key === ' ') fire(ev);
          });
        }
        return item;
      }

      function ctxSep() {
        const s = document.createElement('div');
        s.className = 'bm-ctx-sep';
        return s;
      }

      async function copyToClipboard(text, toastMsg) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            // Fallback for non-secure / old browsers
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          if (typeof showToast === 'function') showToast(toastMsg || 'Copied');
        } catch (e) {
          showError('Copy failed: ' + e.message);
        }
      }

      function triggerDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.setAttribute('download', filename || '');
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      async function saveAsViaPicker(url, filename) {
        // Chromium-only File System Access API. Fires the host "Save as"
        // dialog. On Firefox / Safari we fall back to a normal download
        // and let the browser's "Always ask where to save" preference
        // (if enabled) show the dialog.
        if (!('showSaveFilePicker' in window)) {
          triggerDownload(url, filename);
          if (typeof showToast === 'function') {
            showToast("Save-as dialog needs Chrome/Edge; downloaded to default location. Enable 'Ask where to save each file' in your browser for Save-as everywhere.");
          }
          return;
        }
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: filename || 'download',
          });
          const resp = await fetch(url, { credentials: 'same-origin' });
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const writable = await handle.createWritable();
          await resp.body.pipeTo(writable);
          if (typeof showToast === 'function') showToast('Saved: ' + filename);
        } catch (e) {
          if (e && e.name === 'AbortError') return; // user cancelled
          showError('Save As failed: ' + e.message);
        }
      }

      function openAnalysisResultModal(f) {
        // Fetch the full queue row (description / extracted_text / error)
        // and render a modal. Uses f.id (analysis_queue.id), not
        // source_file_id.
        const backdrop = document.createElement('div');
        backdrop.className = 'bm-modal-backdrop';
        const modal = document.createElement('div');
        modal.className = 'bm-modal';

        const head = document.createElement('div');
        head.className = 'bm-modal-head';
        const title = document.createElement('strong');
        title.textContent = basename(f.source_path);
        head.appendChild(title);
        // v0.31.0: Re-analyze button — DELETE + re-INSERT. Replaces the
        // v0.30.4 UPDATE-in-place approach so re-analyzed rows get a
        // fresh `id` / `enqueued_at` / `retry_count` and no carry-over
        // of any prior column state.
        const reanalyzeBtn = document.createElement('button');
        reanalyzeBtn.className = 'btn btn-ghost btn-xs';
        reanalyzeBtn.type = 'button';
        reanalyzeBtn.style.marginLeft = 'auto';
        reanalyzeBtn.style.marginRight = '0.5rem';
        reanalyzeBtn.textContent = 'Re-analyze';
        reanalyzeBtn.title = 'Delete this row and re-submit as a fresh analysis_queue entry. Uses LLM tokens.';
        reanalyzeBtn.addEventListener('click', async () => {
          if (!confirm('Re-analyze "' + basename(f.source_path) + '"?\n\nThis deletes the existing analysis_queue row and re-submits it as a fresh entry. Uses LLM tokens.')) return;
          reanalyzeBtn.disabled = true;
          reanalyzeBtn.textContent = 'Queueing...';
          try {
            await API.post('/api/analysis/queue/' + encodeURIComponent(f.id) + '/reanalyze', {});
            if (typeof showToast === 'function') showToast('Re-queued for analysis');
            // Close modal and refresh batch list so status flips to pending
            if (backdrop.parentNode) document.body.removeChild(backdrop);
            await refreshStatus();
            await loadBatches();
          } catch (e) {
            showError('Re-analyze failed: ' + e.message);
            reanalyzeBtn.disabled = false;
            reanalyzeBtn.textContent = 'Re-analyze';
          }
        });
        head.appendChild(reanalyzeBtn);
        const closeBtn = document.createElement('button');
        closeBtn.className = 'bm-modal-close';
        closeBtn.type = 'button';
        closeBtn.setAttribute('aria-label', 'Close');
        closeBtn.textContent = '×';
        closeBtn.addEventListener('click', () => document.body.removeChild(backdrop));
        head.appendChild(closeBtn);

        const body = document.createElement('div');
        body.className = 'bm-modal-body';
        setLoadingText(body, 'Loading analysis result...');

        modal.appendChild(head);
        modal.appendChild(body);
        backdrop.appendChild(modal);

        backdrop.addEventListener('click', (ev) => {
          if (ev.target === backdrop) document.body.removeChild(backdrop);
        });
        const escHandler = (ev) => {
          if (ev.key === 'Escape' && backdrop.parentNode) {
            document.body.removeChild(backdrop);
            window.removeEventListener('keydown', escHandler);
          }
        };
        window.addEventListener('keydown', escHandler);

        document.body.appendChild(backdrop);

        API.get('/api/analysis/queue/' + encodeURIComponent(f.id))
          .then(row => renderAnalysisResultBody(body, row))
          .catch(e => {
            clearChildren(body);
            const err = document.createElement('div');
            err.className = 'bm-modal-err';
            err.textContent = 'Failed to load result: ' + (e.message || e);
            body.appendChild(err);
          });
      }

      function renderAnalysisResultBody(body, row) {
        clearChildren(body);

        // Status section
        const sStatus = document.createElement('div');
        sStatus.className = 'bm-modal-section';
        const sh = document.createElement('h4');
        sh.textContent = 'Status';
        sStatus.appendChild(sh);
        const pill = document.createElement('span');
        pill.className = 'bm-pill ' + safeStatus(row.status);
        pill.textContent = row.status || 'unknown';
        sStatus.appendChild(pill);
        if (row.retry_count && Number(row.retry_count) > 0) {
          const retry = document.createElement('span');
          retry.className = 'text-muted';
          retry.style.marginLeft = '0.55rem';
          retry.textContent = 'retry ' + row.retry_count + '/3';
          sStatus.appendChild(retry);
        }
        body.appendChild(sStatus);

        // Path
        const sPath = document.createElement('div');
        sPath.className = 'bm-modal-section';
        const ph = document.createElement('h4');
        ph.textContent = 'Path';
        sPath.appendChild(ph);
        const pv = document.createElement('div');
        pv.className = 'bm-modal-kv';
        pv.textContent = row.source_path || '';
        sPath.appendChild(pv);
        body.appendChild(sPath);

        // Provider / model / tokens (if completed)
        if (row.status === 'completed' && (row.model || row.provider_id)) {
          const sMeta = document.createElement('div');
          sMeta.className = 'bm-modal-section';
          const mh = document.createElement('h4');
          mh.textContent = 'Analysis Metadata';
          sMeta.appendChild(mh);
          const parts = [];
          if (row.provider_id) parts.push('Provider: ' + row.provider_id);
          if (row.model) parts.push('Model: ' + row.model);
          if (row.tokens_used != null) parts.push(row.tokens_used + ' tokens');
          if (row.analyzed_at) parts.push('at ' + fmtDateTime(row.analyzed_at));
          const mv = document.createElement('div');
          mv.className = 'bm-modal-kv';
          mv.textContent = parts.join(' · ');
          sMeta.appendChild(mv);
          body.appendChild(sMeta);
        }

        // Description
        if (row.description) {
          const sDesc = document.createElement('div');
          sDesc.className = 'bm-modal-section';
          const dh = document.createElement('h4');
          dh.textContent = 'Description';
          sDesc.appendChild(dh);
          const dv = document.createElement('div');
          dv.className = 'bm-modal-text';
          dv.textContent = row.description;
          sDesc.appendChild(dv);
          body.appendChild(sDesc);
        }

        // Extracted text
        if (row.extracted_text) {
          const sText = document.createElement('div');
          sText.className = 'bm-modal-section';
          const th = document.createElement('h4');
          th.textContent = 'Extracted Text';
          sText.appendChild(th);
          const tv = document.createElement('div');
          tv.className = 'bm-modal-text';
          tv.textContent = row.extracted_text;
          sText.appendChild(tv);
          body.appendChild(sText);
        }

        // Error
        if (row.error) {
          const sErr = document.createElement('div');
          sErr.className = 'bm-modal-section';
          const eh = document.createElement('h4');
          eh.textContent = 'Error';
          sErr.appendChild(eh);
          const ev = document.createElement('div');
          ev.className = 'bm-modal-err';
          ev.textContent = row.error;
          sErr.appendChild(ev);
          body.appendChild(sErr);
        }

        // Nothing-yet case
        if (!row.description && !row.extracted_text && !row.error) {
          const s = document.createElement('div');
          s.className = 'bm-modal-section';
          const note = document.createElement('p');
          note.className = 'text-muted';
          note.textContent =
            row.status === 'pending' ? 'This file has not been analyzed yet.' :
            row.status === 'batched' ? 'This file is in-flight with the LLM.' :
            row.status === 'excluded' ? 'This file was excluded from analysis.' :
            'No analysis output recorded.';
          s.appendChild(note);
          body.appendChild(s);
        }
      }

      function showContextMenu(x, y, f, onAfterExclude, tbody) {
        closeCtxMenu();
        const menu = document.createElement('div');
        menu.className = 'bm-ctx';
        menu.setAttribute('role', 'menu');

        const fileName = basename(f.source_path);
        const dir = dirname(f.source_path);
        const hasSourceFileId = !!f.source_file_id;
        const downloadUrl = hasSourceFileId
          ? '/api/analysis/files/' + encodeURIComponent(f.source_file_id) + '/download'
          : null;
        const previewUrl = hasSourceFileId
          ? '/api/analysis/files/' + encodeURIComponent(f.source_file_id) + '/preview'
          : null;
        const openUrl = (previewUrl && isImageExt(f.source_path)) ? previewUrl : downloadUrl;

        // v0.29.6: if any rows are currently selected in this tbody, show a
        // multi-download item at the top. Standard file-explorer behavior:
        // if a selection exists, the context menu can operate on it.
        const selected = getSelectedFilesFromTbody(tbody);
        const downloadableSelected = selected.filter(x => !!x.source_file_id);
        if (downloadableSelected.length > 0) {
          menu.appendChild(ctxItem({
            icon: '⇓',
            label: 'Download selected (' + downloadableSelected.length + ')',
            onClick: () => downloadSelectedFiles(selected),
          }));
          menu.appendChild(ctxSep());
        }

        menu.appendChild(ctxItem({
          icon: '↗', label: 'Open in new tab',
          disabled: !openUrl,
          onClick: () => { window.open(openUrl, '_blank', 'noopener'); },
        }));
        menu.appendChild(ctxItem({
          icon: '↓', label: 'Download',
          disabled: !downloadUrl,
          onClick: () => triggerDownload(downloadUrl, fileName),
        }));
        menu.appendChild(ctxItem({
          icon: '…', label: 'Save as…',
          disabled: !downloadUrl,
          onClick: () => saveAsViaPicker(downloadUrl, fileName),
        }));
        menu.appendChild(ctxSep());
        menu.appendChild(ctxItem({
          icon: '⎘', label: 'Copy path',
          onClick: () => copyToClipboard(f.source_path || '', 'Path copied'),
        }));
        menu.appendChild(ctxItem({
          icon: '⎘', label: 'Copy source directory',
          disabled: !dir,
          onClick: () => copyToClipboard(dir, 'Directory copied'),
        }));
        menu.appendChild(ctxSep());
        menu.appendChild(ctxItem({
          icon: '□', label: 'View analysis result',
          onClick: () => openAnalysisResultModal(f),
        }));
        menu.appendChild(ctxSep());
        menu.appendChild(ctxItem({
          icon: '✕', label: 'Exclude from analysis',
          disabled: f.status === 'excluded',
          onClick: async () => {
            if (!confirm('Exclude "' + fileName + '" from analysis?')) return;
            try {
              await API.post('/api/analysis/exclude', { file_ids: [f.id] });
              if (typeof showToast === 'function') showToast('Excluded 1 file');
              if (onAfterExclude) onAfterExclude();
            } catch (e) {
              showError('Exclude failed: ' + e.message);
            }
          },
        }));

        // Position — keep menu inside viewport
        document.body.appendChild(menu);
        const w = menu.offsetWidth || 240;
        const h = menu.offsetHeight || 260;
        let px = x, py = y;
        if (px + w > window.innerWidth - 8) px = window.innerWidth - w - 8;
        if (py + h > window.innerHeight - 8) py = window.innerHeight - h - 8;
        if (px < 4) px = 4;
        if (py < 4) py = 4;
        menu.style.left = px + 'px';
        menu.style.top = py + 'px';
        openCtxMenu = menu;
      }

      function renderFileRow(f, updateSel, tbody) {
        const tr = document.createElement('tr');
        tr.addEventListener('contextmenu', (ev) => {
          ev.preventDefault();
          showContextMenu(ev.clientX, ev.clientY, f, async () => {
            await refreshStatus();
            await loadBatches();
          }, tbody);
        });

        const cbTd = document.createElement('td');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'row-cb';
        cb.dataset.entryId = f.id;
        cb.addEventListener('change', updateSel);
        cbTd.appendChild(cb);
        tr.appendChild(cbTd);

        const nameTd = document.createElement('td');
        const fileName = basename(f.source_path);
        if (f.source_file_id) {
          const a = document.createElement('a');
          a.className = 'filename';
          a.href = '/api/analysis/files/' + encodeURIComponent(f.source_file_id) + '/download';
          a.textContent = fileName;
          a.setAttribute('download', fileName);
          attachPreview(a, f);
          nameTd.appendChild(a);
        } else {
          nameTd.textContent = fileName;
        }
        tr.appendChild(nameTd);

        const pathTd = document.createElement('td');
        pathTd.className = 'path';
        const dir = dirname(f.source_path);
        pathTd.textContent = truncate(dir, 32);
        pathTd.title = dir;
        tr.appendChild(pathTd);

        const sizeTd = document.createElement('td');
        sizeTd.textContent = fmtBytes(f.file_size_bytes);
        tr.appendChild(sizeTd);

        const dateTd = document.createElement('td');
        dateTd.textContent = fmtMtime(f.source_mtime);
        tr.appendChild(dateTd);

        const typeTd = document.createElement('td');
        typeTd.textContent = extOf(f.source_path);
        tr.appendChild(typeTd);

        const statusTd = document.createElement('td');
        const spill = document.createElement('span');
        spill.className = 'bm-pill ' + safeStatus(f.status);
        spill.textContent = f.status || '';
        statusTd.appendChild(spill);
        tr.appendChild(statusTd);

        const actTd = document.createElement('td');
        const excl = document.createElement('button');
        excl.className = 'btn btn-ghost btn-xs';
        excl.type = 'button';
        excl.textContent = 'Exclude';
        excl.disabled = f.status === 'excluded';
        excl.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          if (!confirm('Exclude "' + fileName + '" from analysis?')) return;
          try {
            await API.post('/api/analysis/exclude', { file_ids: [f.id] });
            if (typeof showToast === 'function') showToast('Excluded 1 file');
            await refreshStatus();
            await loadBatches();
          } catch (e) {
            showError('Exclude failed: ' + e.message);
          }
        });
        actTd.appendChild(excl);
        tr.appendChild(actTd);

        return tr;
      }

      // Must match api/routes/analysis.py _ALL_PREVIEW_EXTS (v0.29.8).
      // Browser-native (.jpg/.jpeg/.jfif/.jpe/.png/.apng/.gif/.bmp/.dib/
      // .webp/.avif/.avifs/.ico/.cur) stream raw; PIL-thumbnailed (.tif/
      // .tiff/.eps/.ps/JPEG2000 family/Netpbm family/Targa family/SGI
      // family/.pcx/.dds/.icns/.psd) go through PIL + Ghostscript on the
      // backend.
      const _IMG_EXT = new Set([
        // Native
        '.jpg', '.jpeg', '.jfif', '.jpe',
        '.png', '.apng',
        '.gif', '.bmp', '.dib', '.webp',
        '.avif', '.avifs',
        '.ico', '.cur',
        // Thumbnail via PIL
        '.tif', '.tiff',
        '.eps', '.ps',
        '.jp2', '.j2k', '.jpx', '.jpc', '.jpf', '.j2c',
        '.ppm', '.pgm', '.pbm', '.pnm',
        '.tga', '.icb', '.vda', '.vst',
        '.sgi', '.rgb', '.rgba', '.bw',
        '.pcx', '.dds', '.icns', '.psd',
      ]);
      function isImageExt(p) {
        return _IMG_EXT.has(extOf(p).toLowerCase());
      }

      function attachPreview(anchor, f) {
        if (!f.source_file_id || !isImageExt(f.source_path)) return;
        anchor.addEventListener('mouseenter', (ev) => {
          clearTimeout(previewTimer);
          previewTimer = setTimeout(() => {
            showPreview(f.source_file_id, ev.clientX, ev.clientY);
          }, 250);
        });
        anchor.addEventListener('mousemove', (ev) => {
          if (previewTip) positionTip(ev.clientX, ev.clientY);
        });
        anchor.addEventListener('mouseleave', () => {
          clearTimeout(previewTimer);
          hidePreview();
        });
      }

      function positionTip(x, y) {
        if (!previewTip) return;
        const pad = 16;
        let tx = x + pad;
        let ty = y + pad;
        const w = previewTip.offsetWidth || 320;
        const h = previewTip.offsetHeight || 320;
        if (tx + w > window.innerWidth) tx = x - w - pad;
        if (ty + h > window.innerHeight) ty = y - h - pad;
        previewTip.style.left = tx + 'px';
        previewTip.style.top = ty + 'px';
      }

      function showPreview(sourceFileId, x, y) {
        hidePreview();
        previewTip = document.createElement('div');
        previewTip.className = 'bm-preview-tip';
        const img = document.createElement('img');
        img.alt = '';
        img.src = '/api/analysis/files/' + encodeURIComponent(sourceFileId) + '/preview';
        img.onerror = () => { hidePreview(); };
        previewTip.appendChild(img);
        document.body.appendChild(previewTip);
        positionTip(x, y);
      }

      function hidePreview() {
        if (previewTip && previewTip.parentNode) {
          previewTip.parentNode.removeChild(previewTip);
        }
        previewTip = null;
      }

      // ── Pause duration popover (v0.30.0) ───────────────────────────────
      const PAUSE_PRESETS = [
        { label: 'Pause for 1 hour',  body: { duration_hours: 1 } },
        { label: 'Pause for 2 hours', body: { duration_hours: 2 } },
        { label: 'Pause for 6 hours', body: { duration_hours: 6 } },
        { label: 'Pause for 8 hours', body: { duration_hours: 8 } },
        { label: 'Pause until off-hours', body: { until_off_hours: true } },
        { sep: true },
        { label: 'Pause indefinitely', body: {} },
      ];

      function renderPauseMenu() {
        clearChildren(pauseMenu);
        PAUSE_PRESETS.forEach(p => {
          if (p.sep) {
            const s = document.createElement('div');
            s.className = 'sep';
            pauseMenu.appendChild(s);
            return;
          }
          const item = document.createElement('div');
          item.className = 'item';
          item.setAttribute('role', 'menuitem');
          item.setAttribute('tabindex', '0');
          const lbl = document.createElement('span');
          lbl.textContent = p.label;
          item.appendChild(lbl);
          // Future display of "until X" preview could go in a .sub span
          const fire = async () => {
            hidePauseMenu();
            await doPause(p.body, p.label);
          };
          item.addEventListener('click', fire);
          item.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); fire(); }
          });
          pauseMenu.appendChild(item);
        });
      }
      renderPauseMenu();

      function showPauseMenu() {
        pauseMenu.hidden = false;
        pauseBtn.setAttribute('aria-expanded', 'true');
      }
      function hidePauseMenu() {
        pauseMenu.hidden = true;
        pauseBtn.setAttribute('aria-expanded', 'false');
      }

      pauseBtn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (pauseMenu.hidden) { showPauseMenu(); } else { hidePauseMenu(); }
      });
      window.addEventListener('click', (ev) => {
        if (!pauseMenu.hidden && !pauseMenu.contains(ev.target) && ev.target !== pauseBtn) {
          hidePauseMenu();
        }
      });
      window.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape' && !pauseMenu.hidden) hidePauseMenu();
      });

      async function doPause(body, label) {
        pauseBtn.disabled = true;
        try {
          const result = await API.post('/api/analysis/pause', body || {});
          await refreshStatus();
          if (typeof showToast === 'function') {
            showToast(label || 'Analysis paused');
          }
        } catch (e) {
          showError('Pause failed: ' + e.message);
        } finally {
          pauseBtn.disabled = false;
        }
      }

      resumeBtn.addEventListener('click', async () => {
        resumeBtn.disabled = true;
        try {
          await API.post('/api/analysis/resume', {});
          await refreshStatus();
          if (typeof showToast === 'function') showToast('Analysis resumed');
        } catch (e) {
          showError('Resume failed: ' + e.message);
        } finally {
          resumeBtn.disabled = false;
        }
      });

      cancelBtn.addEventListener('click', async () => {
        if (!confirm('Reset all batched rows back to pending? Any in-flight batch requests will still complete, but no new batches will be submitted until status is Running.')) return;
        cancelBtn.disabled = true;
        try {
          const r = await API.post('/api/analysis/cancel-pending', {});
          if (typeof showToast === 'function') showToast('Reset ' + r.reset + ' row(s) to pending');
          await refreshStatus();
          await loadBatches();
        } catch (e) {
          showError('Cancel failed: ' + e.message);
        } finally {
          cancelBtn.disabled = false;
        }
      });

      refreshBtn.addEventListener('click', async () => {
        refreshBtn.disabled = true;
        try {
          await refreshStatus();
          await loadBatches();
        } finally {
          refreshBtn.disabled = false;
        }
      });

      // v0.31.0: bulk re-analyze modal — DELETE + re-INSERT semantics.
      // Operators preview first (dry-run) then confirm.
      bulkReanalyzeBtn.addEventListener('click', () => openBulkReanalyzeModal());

      function localInputToUtcIso(value) {
        if (!value) return null;
        try {
          const d = new Date(value);
          if (isNaN(d.getTime())) return null;
          return d.toISOString();
        } catch (e) { return null; }
      }

      async function openBulkReanalyzeModal() {
        const backdrop = document.createElement('div');
        backdrop.className = 'bm-modal-backdrop';
        const modal = document.createElement('div');
        modal.className = 'bm-modal';
        backdrop.appendChild(modal);

        const head = document.createElement('div');
        head.className = 'bm-modal-head';
        const title = document.createElement('strong');
        title.textContent = 'Bulk re-analyze (DELETE + re-INSERT)';
        head.appendChild(title);
        const closeBtn = document.createElement('button');
        closeBtn.className = 'bm-modal-close';
        closeBtn.type = 'button';
        closeBtn.setAttribute('aria-label', 'Close');
        closeBtn.textContent = '×';
        closeBtn.addEventListener('click', () => document.body.removeChild(backdrop));
        head.appendChild(closeBtn);
        modal.appendChild(head);

        const body = document.createElement('div');
        body.className = 'bm-modal-body';
        modal.appendChild(body);

        // Filters fieldset — vertical stack of label/input pairs.
        function row(labelText, child) {
          const wrap = document.createElement('div');
          wrap.style.marginBottom = '0.7rem';
          const lbl = document.createElement('label');
          lbl.textContent = labelText;
          lbl.style.display = 'block';
          lbl.style.fontSize = '0.78rem';
          lbl.style.color = 'var(--text-muted, #aaa)';
          lbl.style.marginBottom = '0.2rem';
          wrap.appendChild(lbl);
          wrap.appendChild(child);
          return wrap;
        }

        const beforeInp = document.createElement('input');
        beforeInp.type = 'datetime-local';
        beforeInp.style.width = '100%';
        body.appendChild(row('Analyzed BEFORE (local time) — primary use: refresh stale results before a prompt update', beforeInp));

        const afterInp = document.createElement('input');
        afterInp.type = 'datetime-local';
        afterInp.style.width = '100%';
        body.appendChild(row('Analyzed AFTER (optional)', afterInp));

        const providerSel = document.createElement('select');
        providerSel.style.width = '100%';
        providerSel.appendChild(new Option('(any)', ''));
        body.appendChild(row('Provider (optional)', providerSel));

        const modelSel = document.createElement('select');
        modelSel.style.width = '100%';
        modelSel.appendChild(new Option('(any)', ''));
        body.appendChild(row('Model (optional)', modelSel));

        const statusSel = document.createElement('select');
        statusSel.style.width = '100%';
        ['completed', 'failed', 'pending', 'batched', 'excluded'].forEach(s => {
          statusSel.appendChild(new Option(s, s));
        });
        statusSel.value = 'completed';
        body.appendChild(row('Status to target (default completed)', statusSel));

        const previewBox = document.createElement('div');
        previewBox.style.marginTop = '0.8rem';
        previewBox.style.padding = '0.6rem';
        previewBox.style.background = 'rgba(255,255,255,0.04)';
        previewBox.style.borderRadius = '4px';
        previewBox.style.fontSize = '0.85rem';
        previewBox.textContent = 'Click "Preview" to see how many rows match.';
        body.appendChild(previewBox);

        const btnBar = document.createElement('div');
        btnBar.style.marginTop = '0.8rem';
        btnBar.style.display = 'flex';
        btnBar.style.gap = '0.5rem';
        const previewBtn = document.createElement('button');
        previewBtn.className = 'btn btn-ghost btn-sm';
        previewBtn.type = 'button';
        previewBtn.textContent = 'Preview';
        const runBtn = document.createElement('button');
        runBtn.className = 'btn btn-primary btn-sm';
        runBtn.type = 'button';
        runBtn.textContent = 'Re-analyze matched rows';
        runBtn.disabled = true;  // enabled after a successful preview
        btnBar.appendChild(previewBtn);
        btnBar.appendChild(runBtn);
        body.appendChild(btnBar);

        let lastPreview = null;

        // Populate provider/model dropdowns from distinct values in DB.
        try {
          const filters = await API.get('/api/analysis/queue/reanalyze-filters');
          (filters.providers || []).forEach(p => providerSel.appendChild(new Option(p, p)));
          (filters.models || []).forEach(m => modelSel.appendChild(new Option(m, m)));
        } catch (e) {
          // Non-fatal — operator can still type-free a date filter.
        }

        function buildBody(dryRun) {
          return {
            analyzed_before_iso: localInputToUtcIso(beforeInp.value),
            analyzed_after_iso: localInputToUtcIso(afterInp.value),
            provider_id: providerSel.value || null,
            model: modelSel.value || null,
            status: statusSel.value || 'completed',
            dry_run: dryRun,
          };
        }

        previewBtn.addEventListener('click', async () => {
          previewBtn.disabled = true;
          previewBox.textContent = 'Previewing...';
          runBtn.disabled = true;
          try {
            const r = await API.post('/api/analysis/queue/reanalyze-bulk', buildBody(true));
            lastPreview = r;
            const lines = [];
            lines.push('Matched: ' + r.matched + (r.exceeds_cap ? ' (capped at ' + r.cap + ' — narrow the filter)' : ''));
            if (r.matched > 0) {
              lines.push('Sample paths:');
              (r.sample || []).forEach(p => lines.push('  • ' + p));
            }
            previewBox.textContent = lines.join('\n');
            previewBox.style.whiteSpace = 'pre-wrap';
            runBtn.disabled = (r.matched === 0) || r.exceeds_cap;
          } catch (e) {
            previewBox.textContent = 'Preview failed: ' + e.message;
          } finally {
            previewBtn.disabled = false;
          }
        });

        runBtn.addEventListener('click', async () => {
          if (!lastPreview || lastPreview.matched === 0) return;
          const n = lastPreview.matched;
          const ok = confirm(
            'This DELETES ' + n + ' analysis_queue row(s) and re-submits them as fresh entries.\n\n' +
            'Old analysis_queue.id values for these rows will be lost.\n' +
            'Consumes roughly ' + n + ' image-analysis worth of LLM tokens.\n\n' +
            'Proceed?'
          );
          if (!ok) return;
          runBtn.disabled = true;
          previewBtn.disabled = true;
          previewBox.textContent = 'Running... (this may take several seconds for large batches)';
          try {
            const r = await API.post('/api/analysis/queue/reanalyze-bulk', buildBody(false));
            const lines = [];
            lines.push('Done.');
            lines.push('Deleted: ' + r.deleted);
            lines.push('Re-enqueued: ' + r.re_enqueued);
            if (r.dropped) lines.push('Dropped: ' + r.dropped);
            if (r.failed) {
              lines.push('Failed: ' + r.failed);
              if (r.failure_samples && r.failure_samples.length) {
                lines.push('First failures:');
                r.failure_samples.forEach(s => lines.push('  • ' + s));
              }
            }
            previewBox.textContent = lines.join('\n');
            previewBox.style.whiteSpace = 'pre-wrap';
            if (typeof showToast === 'function') {
              const msg = r.failed
                ? 'Re-enqueued ' + r.re_enqueued + ' row(s); ' + r.failed + ' failed'
                : 'Re-enqueued ' + r.re_enqueued + ' row(s)';
              showToast(msg);
            }
            await refreshStatus();
            await loadBatches();
          } catch (e) {
            previewBox.textContent = 'Run failed: ' + e.message;
            runBtn.disabled = false;
            previewBtn.disabled = false;
          }
        });

        backdrop.addEventListener('click', (ev) => {
          if (ev.target === backdrop) document.body.removeChild(backdrop);
        });
        document.body.appendChild(backdrop);
      }

      (async () => {
        try {
          await refreshStatus();
        } catch (e) {
          pollFailCount = 1;
          showError('Status update failed: ' + (e.message || 'network error'));
        }
      })();
      loadBatches();

      setTimeout(pollTick, 5000);
    })();
  </script>
</body>
</html>
