<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  (function(){
    var D={theme:'nebula',font:'system',textScale:'default',useNewUx:true};
    var p=Object.assign({},D,JSON.parse(localStorage.getItem('mf:preferences:v1')||'{}'));
    var h=document.documentElement;
    h.setAttribute('data-theme',p.theme);
    h.setAttribute('data-font',p.font);
    h.setAttribute('data-text-scale',p.textScale);
    h.setAttribute('data-ux',p.useNewUx?'new':'orig');
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;600&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;500;700&family=Poppins:wght@400;500;600&family=DM+Sans:wght@400;500&family=Crimson+Pro:wght@400;600&display=swap">
  <title>OCR Review — MarkFlow</title>
  <link rel="stylesheet" href="/static/markflow.css">
  <style>
    .review-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .review-header h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }

    .review-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .review-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 340px;
    }

    .image-pane {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      min-height: 240px;
    }

    .image-pane img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-sm);
      object-fit: contain;
      display: none;
    }

    .no-image-msg { color: var(--text-muted); font-size: 0.85rem; text-align: center; }

    .text-pane {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .text-pane label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }

    .text-pane textarea {
      width: 100%;
      flex: 1;
      min-height: 120px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      font-size: 1rem;
      resize: vertical;
      font-family: var(--font-sans);
      line-height: 1.5;
      background: var(--surface);
      color: var(--text);
    }
    .text-pane textarea:focus { outline: none; border-color: var(--accent); }

    .meta-row { display: flex; gap: 1rem; font-size: 0.82rem; color: var(--text-muted); }

    .conf-badge {
      font-weight: 600;
      padding: 0.1em 0.5em;
      border-radius: 99px;
      font-size: 0.82rem;
    }
    .conf-low  { background: rgba(220,38,38,.1); color: var(--error); }
    .conf-mid  { background: rgba(245,158,11,.1); color: var(--warn); }
    .conf-high { background: rgba(22,163,74,.1); color: var(--ok); }

    .action-bar {
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .done-msg {
      display: none;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .done-msg h2 { color: var(--ok); margin-bottom: 0.5rem; }
    .done-msg p { color: var(--text-muted); }

    @media (max-width: 620px) {
      .review-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="review-header">
  <h1 data-help="ocr-pipeline#review-ui">OCR Review</h1>
  <span id="progress-label" class="text-sm text-muted">Loading...</span>
</div>

<div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem;gap:1.25rem">
  <p id="batch-title" class="text-sm text-muted"></p>
  <div id="error-msg" class="error-banner" hidden></div>

  <div class="review-card" id="review-card">
    <div class="review-body">
      <div class="image-pane">
        <img id="region-img" alt="Flagged region">
        <p id="no-image-msg" class="no-image-msg">No image preview available</p>
      </div>
      <div class="text-pane">
        <label for="ocr-text">OCR Text (edit to correct)</label>
        <textarea id="ocr-text" spellcheck="true"></textarea>
        <div class="meta-row">
          <span>Confidence: <span id="confidence-badge" class="conf-badge">—</span></span>
          <span id="location-info"></span>
        </div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary btn-sm" id="btn-accept" style="background:var(--ok)">Accept</button>
      <button class="btn btn-primary btn-sm" id="btn-edit-accept">Edit &amp; Accept</button>
      <button class="btn btn-ghost btn-sm" id="btn-skip">Skip</button>
      <div style="flex:1"></div>
      <button class="btn btn-sm" id="btn-accept-all" style="background:var(--warn);color:white">Accept All</button>
    </div>
  </div>

  <div class="done-msg" id="done-msg">
    <h2>Review complete</h2>
    <p>All OCR flags have been resolved.</p>
    <a id="results-link" href="#" class="btn btn-primary mt-1">Back to progress</a>
  </div>

  <a href="/" class="text-sm text-muted" style="margin-top:0.5rem">&larr; Back to home</a>
</div>

<script src="/static/app.js"></script>
<script>
const params  = new URLSearchParams(location.search);
const batchId = params.get("batch_id") || "";
let flags  = [];
let current = 0;

const progressLabel = document.getElementById("progress-label");
const batchTitle    = document.getElementById("batch-title");
const errorMsgEl    = document.getElementById("error-msg");
const card          = document.getElementById("review-card");
const doneMsg       = document.getElementById("done-msg");
const regionImg     = document.getElementById("region-img");
const noImageMsg    = document.getElementById("no-image-msg");
const ocrText       = document.getElementById("ocr-text");
const confBadge     = document.getElementById("confidence-badge");
const locationInfo  = document.getElementById("location-info");
const btnAccept     = document.getElementById("btn-accept");
const btnEdit       = document.getElementById("btn-edit-accept");
const btnSkip       = document.getElementById("btn-skip");
const btnAcceptAll  = document.getElementById("btn-accept-all");
const resultsLink   = document.getElementById("results-link");

if (!batchId) {
  showErrMsg("No batch_id in URL. Navigate here from the conversion progress page.");
} else {
  batchTitle.textContent = `Batch: ${batchId}`;
  resultsLink.href = `/progress.html?batch_id=${encodeURIComponent(batchId)}`;
  loadFlags();
}

async function loadFlags() {
  try {
    const r = await fetch(`/api/batch/${batchId}/review?status=pending`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    flags = await r.json();
    current = 0;
    if (flags.length === 0) {
      showDone();
    } else {
      renderFlag(0);
    }
  } catch (e) {
    showErrMsg(`Failed to load flags: ${e.message}`);
  }
}

function renderFlag(idx) {
  if (idx >= flags.length) { showDone(); return; }
  const f = flags[idx];
  progressLabel.textContent = `Reviewing flag ${idx + 1} of ${flags.length}`;

  if (f.image_url) {
    regionImg.src = f.image_url;
    regionImg.style.display = "block";
    noImageMsg.style.display = "none";
  } else {
    regionImg.style.display = "none";
    noImageMsg.style.display = "block";
  }

  ocrText.value = f.ocr_text || "";
  const conf = f.confidence ?? 0;
  confBadge.textContent = `${conf.toFixed(1)}%`;
  confBadge.className = `conf-badge ${conf < 50 ? 'conf-low' : conf < 80 ? 'conf-mid' : 'conf-high'}`;
  const bbox = f.region_bbox || [];
  locationInfo.textContent = `Page ${f.page_num}${bbox.length ? `, region (${bbox.join(", ")})` : ""}`;
  setDisabled(false);
}

btnAccept.addEventListener("click", () => submit("accept", null));
btnEdit.addEventListener("click",   () => submit("edit",   ocrText.value.trim()));
btnSkip.addEventListener("click",   () => submit("skip",   null));

btnAcceptAll.addEventListener("click", async () => {
  setDisabled(true);
  try {
    const r = await fetch(`/api/batch/${batchId}/review/accept-all`, { method: "POST" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    showDone();
  } catch (e) {
    showErrMsg(`Accept-all failed: ${e.message}`);
    setDisabled(false);
  }
});

async function submit(action, correctedText) {
  if (current >= flags.length) return;
  if (action === "edit" && !correctedText) {
    showErrMsg("Please enter corrected text before clicking Edit & Accept.");
    return;
  }
  setDisabled(true);
  clearErrMsg();

  const flag = flags[current];
  const body = { action };
  if (correctedText !== null) body.corrected_text = correctedText;

  try {
    const r = await fetch(`/api/batch/${batchId}/review/${flag.flag_id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${r.status}`);
    }
    current++;
    current >= flags.length ? showDone() : renderFlag(current);
  } catch (e) {
    showErrMsg(`Failed to submit: ${e.message}`);
    setDisabled(false);
  }
}

function showDone() {
  card.style.display = "none";
  doneMsg.style.display = "block";
  progressLabel.textContent = "Done";
}

function showErrMsg(msg) {
  errorMsgEl.textContent = msg;
  errorMsgEl.hidden = false;
}

function clearErrMsg() {
  errorMsgEl.textContent = "";
  errorMsgEl.hidden = true;
}

function setDisabled(v) {
  [btnAccept, btnEdit, btnSkip, btnAcceptAll].forEach(b => b.disabled = v);
}
</script>
</body>
</html>
