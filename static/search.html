<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkFlow — Search</title>
  <link rel="stylesheet" href="/static/markflow.css">
  <style>
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-box input { flex: 1; padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; background: var(--surface); color: var(--text); }
    .search-box input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .search-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .search-filters { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .search-filters select { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 0.85rem; }
    .radio-group { display: flex; gap: 0.5rem; }
    .radio-group label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; cursor: pointer; }
    .hit { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
    .hit:last-child { border-bottom: none; }
    .hit-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.25rem; }
    .hit-title { font-weight: 600; font-size: 1rem; }
    .hit-path { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 0.35rem; }
    .hit-snippet { font-size: 0.9rem; line-height: 1.5; color: var(--text); }
    .hit-snippet em { font-style: normal; background: rgba(79, 91, 213, 0.15); padding: 0.05em 0.15em; border-radius: 2px; }
    .hit-actions { margin-top: 0.4rem; display: flex; gap: 0.5rem; }
    .index-status { font-size: 0.82rem; color: var(--text-muted); }
    .index-offline { color: var(--error); font-weight: 500; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">MarkFlow</a>
    <div id="main-nav" class="nav-links"></div>
  </nav>

  <div class="container page-content">
    <div id="error-banner" role="alert" hidden></div>

    <h1 data-help="search">Search</h1>
    <div id="index-status" class="index-status mb-1"></div>

    <div class="search-box">
      <div class="search-autocomplete-wrapper">
        <input type="search" id="search-input" placeholder="Search documents..." autofocus autocomplete="off">
        <ul id="autocomplete-list" class="autocomplete-dropdown" hidden></ul>
      </div>
      <button class="btn btn-primary" id="search-btn">Search</button>
    </div>

    <div class="search-filters">
      <select id="filter-format">
        <option value="">All formats</option>
        <option value="docx">DOCX</option>
        <option value="pdf">PDF</option>
        <option value="pptx">PPTX</option>
        <option value="xlsx">XLSX</option>
        <option value="csv">CSV</option>
      </select>
      <div class="radio-group">
        <label><input type="radio" name="index" value="documents" checked> Documents</label>
        <label><input type="radio" name="index" value="adobe-files"> Adobe</label>
      </div>
    </div>

    <div id="deletion-banner" hidden></div>
    <div id="search-meta" class="search-meta" hidden></div>

    <div class="card" id="results-card" style="padding:0" hidden>
      <div id="results-list"></div>
    </div>

    <div class="pagination" id="pagination" hidden>
      <span id="pagination-info" class="text-sm text-muted"></span>
      <div class="pagination-pages" id="pagination-pages"></div>
    </div>

    <div id="empty-state" class="empty-state" hidden>
      <h3 id="empty-title">No results</h3>
      <p id="empty-text">Try different keywords or change the index filter.</p>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/js/lifecycle-badge.js"></script>
  <script src="/static/js/deletion-banner.js"></script>
  <script>
  let debounceTimer = null;
  let currentPage = 1;
  let currentIndex = 'documents';
  let currentFormat = '';

  // Init from URL params
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('q')) document.getElementById('search-input').value = urlParams.get('q');
  if (urlParams.get('index')) {
    currentIndex = urlParams.get('index');
    document.querySelector(`input[name="index"][value="${currentIndex}"]`).checked = true;
  }
  if (urlParams.get('format')) {
    currentFormat = urlParams.get('format');
    document.getElementById('filter-format').value = currentFormat;
  }
  if (urlParams.get('page')) currentPage = parseInt(urlParams.get('page')) || 1;

  // Load index status
  (async () => {
    try {
      const data = await API.get('/api/search/index/status');
      const el = document.getElementById('index-status');
      if (data.available) {
        el.textContent = `${data.documents.document_count.toLocaleString()} documents indexed` +
          (data.adobe_files.document_count > 0 ? ` | ${data.adobe_files.document_count.toLocaleString()} Adobe files` : '');
      } else {
        el.innerHTML = '<span class="index-offline">Search index offline &mdash; check debug dashboard</span>';
      }
    } catch (e) { /* non-critical */ }
  })();

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (q.length < 2) return;

    updateURL(q);
    document.getElementById('results-card').hidden = true;
    document.getElementById('empty-state').hidden = true;
    document.getElementById('search-meta').hidden = true;

    try {
      const qs = new URLSearchParams({ q, index: currentIndex, page: currentPage, per_page: 10, highlight: true });
      if (currentFormat && currentIndex === 'documents') qs.set('format', currentFormat);

      const data = await API.get(`/api/search?${qs}`);
      renderResults(data);
    } catch (e) {
      if (e.status === 503) {
        showError('Search index is offline. Check the debug dashboard.');
      } else {
        showError(`Search failed: ${e.message}`);
      }
    }
  }

  function renderResults(data) {
    const meta = document.getElementById('search-meta');
    meta.hidden = false;
    meta.textContent = `${data.total_hits} result${data.total_hits !== 1 ? 's' : ''} for "${data.query}" (${data.processing_time_ms}ms)`;

    const list = document.getElementById('results-list');
    const card = document.getElementById('results-card');

    if (!data.hits.length) {
      card.hidden = true;
      document.getElementById('empty-state').hidden = false;
      document.getElementById('empty-title').textContent = `No results for "${data.query}"`;
      document.getElementById('pagination').hidden = true;
      return;
    }

    card.hidden = false;
    document.getElementById('empty-state').hidden = true;

    list.innerHTML = data.hits.map(hit => {
      const badge = formatBadge(hit.source_format || hit.file_ext || '');
      const snippet = hit.highlight || hit.content_preview || hit.text_preview || '';
      const path = hit.relative_path || hit.source_path || '';
      return `<div class="hit">
        <div class="hit-header">
          <span class="hit-title">${escapeHtml(hit.title || hit.source_filename)}</span>
          ${badge}
        </div>
        <div class="hit-path">${escapeHtml(path)}</div>
        <div class="hit-snippet">${snippet}</div>
        <div class="hit-actions">
          <span class="text-sm text-muted">${escapeHtml(hit.source_path || '')}</span>
        </div>
      </div>`;
    }).join('');

    // Pagination
    const totalPages = Math.ceil(data.total_hits / data.per_page);
    const pagination = document.getElementById('pagination');
    const pagesEl = document.getElementById('pagination-pages');
    const infoEl = document.getElementById('pagination-info');

    if (totalPages <= 1) {
      pagination.hidden = true;
    } else {
      pagination.hidden = false;
      const start = (data.page - 1) * data.per_page + 1;
      const end = Math.min(data.page * data.per_page, data.total_hits);
      infoEl.textContent = `${start}-${end} of ${data.total_hits}`;

      let html = `<button ${data.page <= 1 ? 'disabled' : ''} onclick="goPage(${data.page - 1})">&larr;</button>`;
      for (let i = Math.max(1, data.page - 2); i <= Math.min(totalPages, data.page + 2); i++) {
        html += `<button class="${i === data.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button ${data.page >= totalPages ? 'disabled' : ''} onclick="goPage(${data.page + 1})">&rarr;</button>`;
      pagesEl.innerHTML = html;
    }
  }

  function goPage(p) { currentPage = p; doSearch(); }

  function updateURL(q) {
    const p = new URLSearchParams();
    if (q) p.set('q', q);
    if (currentIndex !== 'documents') p.set('index', currentIndex);
    if (currentFormat) p.set('format', currentFormat);
    if (currentPage > 1) p.set('page', currentPage);
    const qs = p.toString();
    history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Autocomplete ─────────────────────────────────────────────────────────
  const acInput = document.getElementById('search-input');
  const acList  = document.getElementById('autocomplete-list');
  let acTimer = null;
  let activeIdx = -1;

  acInput.addEventListener('input', () => {
    clearTimeout(acTimer);
    const q = acInput.value.trim();
    if (q.length < 2) { hideAC(); return; }
    acTimer = setTimeout(() => fetchSuggestions(q), 200);
  });

  acInput.addEventListener('keydown', (e) => {
    const items = acList.querySelectorAll('li');
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveAC(items,  1); }
    if (e.key === 'ArrowUp')    { e.preventDefault(); moveAC(items, -1); }
    if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault();
      items[activeIdx]?.click();
      return;
    }
    if (e.key === 'Escape') hideAC();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-autocomplete-wrapper')) hideAC();
  });

  async function fetchSuggestions(q) {
    try {
      const res  = await fetch(`/api/search/autocomplete?q=${encodeURIComponent(q)}&limit=6`);
      const data = await res.json();
      renderAC(data.suggestions || []);
    } catch { hideAC(); }
  }

  function renderAC(suggestions) {
    acList.innerHTML = '';
    activeIdx = -1;
    if (!suggestions.length) { hideAC(); return; }
    suggestions.forEach((s, i) => {
      const li = document.createElement('li');
      li.dataset.idx = i;
      li.innerHTML = `<span class="ac-title">${escapeHtml(s.title)}</span>
                      <span class="ac-format">${s.format.toUpperCase()}</span>`;
      li.addEventListener('mouseenter', () => setActive(acList.querySelectorAll('li'), i));
      li.addEventListener('click', () => {
        acInput.value = s.title;
        hideAC();
        currentPage = 1;
        doSearch();
      });
      acList.appendChild(li);
    });
    acList.hidden = false;
  }

  function moveAC(items, dir) {
    activeIdx = Math.max(-1, Math.min(items.length - 1, activeIdx + dir));
    setActive(items, activeIdx);
  }

  function setActive(items, idx) {
    items.forEach((li, i) => li.classList.toggle('ac-active', i === idx));
    activeIdx = idx;
  }

  function hideAC() { acList.hidden = true; acList.innerHTML = ''; activeIdx = -1; }

  // Events
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage = 1; doSearch(); }, 400);
  });
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && activeIdx < 0) { clearTimeout(debounceTimer); currentPage = 1; doSearch(); }
  });
  document.getElementById('search-btn').addEventListener('click', () => { currentPage = 1; doSearch(); });
  document.getElementById('filter-format').addEventListener('change', e => {
    currentFormat = e.target.value; currentPage = 1; doSearch();
  });
  document.querySelectorAll('input[name="index"]').forEach(r => {
    r.addEventListener('change', () => { currentIndex = r.value; currentPage = 1; doSearch(); });
  });

  // Auto-search if query in URL
  if (document.getElementById('search-input').value.trim().length >= 2) doSearch();
  </script>
</body>
</html>
