<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkFlow — Results</title>
  <link rel="stylesheet" href="/static/markflow.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">MarkFlow</a>
    <div id="main-nav" class="nav-links"></div>
  </nav>

  <div class="container page-content">
    <div class="empty-state">
      <h3>Redirecting to history...</h3>
      <p>Your conversion results are now in the <a href="/history.html">History</a> page.</p>
    </div>
  </div>

  <script>
  // Redirect to history page, preserving batch context
  const params = new URLSearchParams(location.search);
  const batchId = params.get('batch_id');
  setTimeout(() => {
    window.location.href = batchId ? `/history.html?search=${batchId}` : '/history.html';
  }, 1000);
  </script>
</body>
</html>
