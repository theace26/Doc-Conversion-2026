        const x = document.createElement('button');
        x.type = 'button';
        x.className = 'dismiss';
        x.textContent = '×';
        x.title = 'Dismiss';
        x.addEventListener('click', () => {
          if (banner.parentNode) banner.parentNode.removeChild(banner);
        });
        banner.appendChild(x);
        // Insert at the very top of pv-wrap, before the nav bar.
        const wrap = document.querySelector('.pv-wrap');
        if (wrap) wrap.insertBefore(banner, wrap.firstChild);
        staleBannerEl = banner;
        // Auto-dismiss after 12 seconds — long enough to read, short
        // enough not to clutter once the operator's seen it.
        setTimeout(() => {
          if (banner.parentNode) banner.parentNode.removeChild(banner);
        }, 12000);
      }

      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState !== 'visible') return;
        if (!state.path || !state.lastInfoVersion) return;
        // Don't compete with an in-flight force-action poll.
        if (state.forceActionPolling) return;
        try {
          const fresh = await API.get(
            '/api/preview/info?path=' + encodeURIComponent(state.path)
          );
          const oldVer = state.lastInfoVersion;
          const newVer = fresh.info_version;
          if (newVer && oldVer && newVer !== oldVer) {
            // State changed while the tab was hidden — re-render and
            // surface the banner so the operator knows why content
            // they were looking at is now different.
            state.info = fresh;
            state.lastInfoVersion = newVer;
            renderAll(fresh);
            showStaleBanner();
          }
        } catch (e) {
          // Quiet failure — visibility-change re-fetch is opportunistic.
        }
      });

      // ── Page load ──────────────────────────────────────────────
      async function loadInfo(path) {
        loadingEl.hidden = false;
        errorEl.hidden = true;
        toolbarEl.hidden = true;
        mainEl.hidden = true;
        try {
          const data = await API.get('/api/preview/info?path=' + encodeURIComponent(path));
          state.info = data;
          state.path = path;
          state.lastInfoVersion = data.info_version || null;
          renderAll(data);
          loadingEl.hidden = true;
          toolbarEl.hidden = false;
          mainEl.hidden = false;
          // Update document title with the file name for tab clarity.
          document.title = (data.name || 'Preview') + ' — MarkFlow';
        } catch (e) {
          loadingEl.hidden = true;
          const wrap = document.createElement('div');
          const h = document.createElement('h2');
          h.textContent = 'Failed to load preview';
          wrap.appendChild(h);
          const p = document.createElement('p');
          p.textContent = e.message;
          wrap.appendChild(p);
          const a = document.createElement('a');
          a.href = '/';
          a.textContent = '← Back to Home';
          wrap.appendChild(a);
          showError(wrap);
        }
      }

      function renderAll(info) {
        renderBreadcrumb(info.path);
        titleEl.textContent = info.name || info.path || 'Preview';
        setStatusPill(info);
        renderActions(info);
        renderMeta(info);
        renderConversion(info);
        renderAnalysis(info);
        renderFlags(info);
        renderSiblings(info);
        renderViewer(info);
        refreshSearchPageLinks(info);
        // v0.34.0: cross-reference card. Only fires for media-shaped paths.
        loadPrprojRefsCard(info);
        // Auto-populate the Related card with the currently-selected
        // mode (default: semantic). Cheap — it's Meili / Qdrant only,
        // no LLM cost.
        runRelatedSearch(state.relatedMode, '');
      }

      function loadPrprojRefsCard(info) {
        var card = document.getElementById('pv-prproj-refs-card');
        if (!card) return;
        // Hide by default; show on success when there's something to show.
        if (!window.PrprojRefs || !info || !info.path) {
          card.hidden = true;
          return;
        }
        if (!window.PrprojRefs.isLikelyMediaPath(info.path)) {
          card.hidden = true;
          return;
        }
        // Always render the card (with empty state if no refs) — gives
        // operators visual confirmation the lookup ran.
        card.hidden = false;
        window.PrprojRefs.fetchProjectsReferencing(info.path).then(function (refs) {
          window.PrprojRefs.renderReferencesCard(card, refs);
        });
      }

      // ── Keyboard shortcuts ─────────────────────────────────────
      document.addEventListener('keydown', (ev) => {
        // Don't intercept when the user is typing in a control.
        if (ev.target && ev.target.tagName) {
          const tag = ev.target.tagName.toUpperCase();
          if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        }
        if (!state.info || !state.info.siblings) return;
        const fileSiblings = (state.info.siblings.files || []).filter(f => !f.is_dir);
        const idx = fileSiblings.findIndex(f => f.is_current);

        if (ev.key === 'ArrowLeft' && idx > 0) {
          ev.preventDefault();
          navigateToSibling(fileSiblings[idx - 1].path);
        } else if (ev.key === 'ArrowRight' && idx >= 0 && idx < fileSiblings.length - 1) {
          ev.preventDefault();
          navigateToSibling(fileSiblings[idx + 1].path);
        } else if (ev.key === 'Escape') {
          // Back to the parent dir on the Pipeline Files page.
          if (state.info.parent_dir) {
            window.location.href = '/static/pipeline-files.html?folder=' + encodeURIComponent(state.info.parent_dir);
          }
        }
      });

      // Browser back / forward — re-load on history navigation.
      window.addEventListener('popstate', () => {
        const params = new URLSearchParams(window.location.search);
        const path = params.get('path');
        if (path && path !== state.path) loadInfo(path);
      });

      // ── Bootstrap ──────────────────────────────────────────────
      // Bind interactive sidebar handlers once; their behavior is
      // path-driven via state.path so we don't need to re-bind on
      // navigation between siblings.
      bindRelatedTabs();
      bindSearchPanel();

      const params = new URLSearchParams(window.location.search);
      const initialPath = params.get('path');
      if (!initialPath) {
        loadingEl.hidden = true;
        const wrap = document.createElement('div');
        const h = document.createElement('h2');
        h.textContent = 'No file selected';
        wrap.appendChild(h);
        const p = document.createElement('p');
        p.textContent = 'This page expects a ?path=<absolute container path> query parameter. ' +
          'Click the folder icon on a Pipeline Files row to open a file in this view.';
        wrap.appendChild(p);
        const a = document.createElement('a');
        a.href = '/static/pipeline-files.html';
        a.textContent = '→ Open Pipeline Files';
        wrap.appendChild(a);
        showError(wrap);
      } else {
        loadInfo(initialPath);
      }
    })();
  </script>
  <script src="/static/js/components/ux-fallback.js"></script>
  <script>MFNewUxFallback.flag();</script>
</body>
