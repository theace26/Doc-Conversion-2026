<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkFlow — History</title>
  <link rel="stylesheet" href="/static/markflow.css?v=0.35.0">
  <style>
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-row td { background: var(--surface-alt); padding: 1rem 1.25rem; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem 1.5rem; }
    .detail-grid dt { font-weight: 600; color: var(--text-muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .detail-grid dd { margin: 0 0 0.6rem 0; font-size: 0.9rem; }
    .clickable-row { cursor: pointer; }
    .clickable-row:hover td { background: var(--surface-alt); }
    .ocr-badge { display: inline-flex; align-items: center; gap: 0.25em; font-size: 0.75rem; font-weight: 600; padding: 0.15em 0.45em; border-radius: var(--radius-sm); white-space: nowrap; }
    .ocr-badge.ok { background: rgba(22,163,74,0.12); color: var(--ok); }
    .ocr-badge.warn { background: rgba(217,119,6,0.12); color: var(--warn); }
    .ocr-badge.error { background: rgba(220,38,38,0.12); color: var(--error); }
    .conf-bar-track { position: relative; height: 0.5rem; background: var(--surface-alt); border-radius: 0.25rem; overflow: visible; margin: 0.25rem 0; min-width: 120px; }
    .conf-bar-fill { height: 100%; border-radius: 0.25rem; transition: width 0.3s; }
    .conf-bar-track::after { content: ""; position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--text-muted); opacity: 0.6; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">MarkFlow</a>
    <div id="main-nav" class="nav-links"></div>
  </nav>

  <div class="container page-content">
    <div id="error-banner" role="alert" hidden></div>

    <h1 data-help="document-conversion#history">Conversion History</h1>
    <div id="stats-row" class="stats-row mt-1 mb-2"></div>

    <div id="active-op-widget-mount-pipeline" style="margin-bottom:0.75rem"></div>

    <!-- Pending Files Card -->
    <div class="card mb-2" id="pending-card" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">
          Pending Files
          <span id="pending-count-badge" style="font-size:0.8rem;padding:0.15em 0.5em;border-radius:var(--radius-sm);background:rgba(79,91,213,0.12);color:var(--accent);margin-left:0.5rem">0</span>
        </h3>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <button id="force-transcribe-btn" type="button"
                  class="btn btn-primary btn-sm"
                  title="Trigger an immediate scan + convert cycle that will pick up every pending file, including audio/video transcription via Whisper. Equivalent to Pipeline → Run Now.">
            Force Transcribe / Convert Pending
          </button>
          <select id="pending-status-filter" style="font-size:0.82rem;padding:0.3rem 0.5rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)">
            <option value="pending">Pending</option>
            <option value="failed">Failed</option>
          </select>
          <input type="search" id="pending-search" placeholder="Search..." style="font-size:0.82rem;padding:0.3rem 0.5rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:180px">
        </div>
      </div>
      <!-- v0.31.6: bulk-action bar for hand-picked selections. Hidden
           until at least one row is checked. Replaces the all-or-nothing
           commit to "Force Transcribe / Convert Pending" with a
           targeted "Convert Selected (N)" path. -->
      <div id="pending-bulk-bar" hidden
           style="display:none;margin-top:0.75rem;padding:0.55rem 0.85rem;
                  background:rgba(79,91,213,0.10);
                  border:1px solid rgba(79,91,213,0.35);
                  border-radius:var(--radius-sm);
                  align-items:center;gap:0.7rem;font-size:0.85rem">
        <strong id="pending-bulk-count">0 selected</strong>
        <span id="pending-bulk-context" style="color:var(--text-muted)"></span>
        <span style="flex:1"></span>
        <button id="pending-bulk-convert" type="button"
                class="btn btn-primary btn-sm">Convert Selected</button>
        <button id="pending-bulk-clear" type="button"
                class="btn btn-ghost btn-sm">Clear selection</button>
      </div>
      <div style="overflow-x:auto;margin-top:0.75rem">
        <table class="data-table" style="font-size:0.82rem">
          <thead>
            <tr>
              <th style="width:32px;padding-right:0">
                <input type="checkbox" id="pending-select-all"
                       title="Select all files on this page"
                       style="cursor:pointer;margin:0">
              </th>
              <th style="width:45%">File</th>
              <th style="width:60px">Type</th>
              <th style="width:70px">Size</th>
              <th style="width:100px">Job Started</th>
              <th>Status / Error</th>
            </tr>
          </thead>
          <tbody id="pending-tbody"></tbody>
        </table>
      </div>
      <div id="pending-pagination" style="display:flex;gap:0.5rem;align-items:center;justify-content:center;margin-top:0.75rem;font-size:0.82rem"></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <select id="filter-format">
        <option value="">All formats</option>
      </select>
      <select id="filter-status">
        <option value="">All status</option>
        <option value="success">Success</option>
        <option value="error">Error</option>
      </select>
      <input type="search" id="filter-search" placeholder="Search files...">
    </div>

    <!-- Table -->
    <div class="card" style="padding:0;overflow:auto">
      <table class="data-table" id="history-table">
        <thead>
          <tr>
            <th data-sort="date_desc">Filename <span class="sort-icon"></span></th>
            <th>Format</th>
            <th>Status</th>
            <th data-sort="duration_desc">Duration <span class="sort-icon"></span></th>
            <th data-sort="date_desc">Date <span class="sort-icon"></span></th>
            <th>OCR</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="6" style="text-align:center;padding:2rem"><span class="spinner"></span> Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <span id="pagination-info" class="text-sm text-muted"></span>
      <div class="pagination-pages" id="pagination-pages"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <h3>No conversions yet</h3>
      <p>Convert your first file to see it here.</p>
      <a href="/" class="btn btn-primary">Convert a file</a>
    </div>

    <div id="empty-filtered" class="empty-state" hidden>
      <h3>No results match your filters</h3>
      <p id="empty-filtered-text"></p>
      <button class="btn btn-ghost" onclick="clearFilters()">Clear filters</button>
    </div>
  </div>

  <script src="/static/app.js?v=0.35.0"></script>
  <script src="/static/js/lifecycle-badge.js?v=0.35.0"></script>
  <script src="/static/js/version-panel.js?v=0.35.0"></script>
  <script src="/static/js/active-ops-poller.js?v=0.35.0"></script>
  <script src="/static/js/active-op-widget.js?v=0.35.0"></script>
  <script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var hl = params.get('op_id');
    var mount = document.getElementById('active-op-widget-mount-pipeline');
    if (mount && typeof window.mountActiveOpWidget === 'function') {
      window.mountActiveOpWidget(mount, {
        filter: function (op) {
          return op.op_type && op.op_type.indexOf('pipeline.') === 0;
        },
        highlightOpId: hl,
      });
    }
  })();
  </script>
  <script>
  // State
  let currentPage = 1;
  let currentSort = 'date_desc';
  let currentFormat = '';
  let currentStatus = '';
  let currentSearch = '';
  let debounceTimer = null;
  let expandedRow = null;

  // Init from URL params
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('format')) { currentFormat = urlParams.get('format'); document.getElementById('filter-format').value = currentFormat; }
  if (urlParams.get('status')) { currentStatus = urlParams.get('status'); document.getElementById('filter-status').value = currentStatus; }
  if (urlParams.get('search')) { currentSearch = urlParams.get('search'); document.getElementById('filter-search').value = currentSearch; }
  if (urlParams.get('page'))   { currentPage = parseInt(urlParams.get('page')) || 1; }
  if (urlParams.get('sort'))   { currentSort = urlParams.get('sort'); }

  // OCR badge helpers
  function ocrConfClass(conf, threshold) {
    if (conf == null) return 'ok';
    if (conf >= threshold) return 'ok';
    if (conf >= 60) return 'warn';
    return 'error';
  }

  function renderOcrBadge(ocr) {
    if (!ocr || !ocr.ran) return '';
    if (ocr.confidence_mean == null) return '<span class="ocr-badge ok">OCR</span>';
    const cls = ocrConfClass(ocr.confidence_mean, ocr.threshold || 80);
    const warn = cls === 'error' ? ' ⚠' : '';
    return `<span class="ocr-badge ${cls}">OCR ${Math.round(ocr.confidence_mean)}%${warn}</span>`;
  }

  function renderOcrDetail(ocr) {
    if (!ocr || !ocr.ran || ocr.confidence_mean == null) return '';
    const threshold = ocr.threshold || 80;
    const cls = ocrConfClass(ocr.confidence_mean, threshold);
    const pct = Math.min(100, Math.max(0, ocr.confidence_mean));
    return `
      <dt>OCR confidence</dt>
      <dd>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <div class="conf-bar-track" style="flex:1;--threshold:${threshold}">
            <div class="conf-bar-fill" style="width:${pct}%;background:var(--${cls})"></div>
          </div>
          <span class="text-sm" style="font-weight:600">${ocr.confidence_mean.toFixed(1)}%</span>
        </div>
        <div class="text-sm text-muted" style="margin-top:0.2rem">
          Lowest page: ${ocr.confidence_min != null ? ocr.confidence_min.toFixed(1) + '%' : '—'}
          &nbsp;·&nbsp; ${ocr.pages_below_threshold || 0} of ${ocr.page_count || '?'} pages below threshold (${threshold}%)
        </div>
      </dd>`;
  }

  // Load stats
  (async () => {
    try {
      const stats = await API.get('/api/history/stats');
      const rate = stats.total_conversions > 0 ? stats.success_rate_pct : 0;
      let ocrStr = '';
      if (stats.ocr_stats) {
        ocrStr = `<span>OCR avg <strong>${stats.ocr_stats.mean_confidence_overall != null ? stats.ocr_stats.mean_confidence_overall.toFixed(1) + '%' : '—'}</strong></span>` +
          `<span><strong>${stats.ocr_stats.files_below_threshold}</strong> below threshold</span>`;
      }
      document.getElementById('stats-row').innerHTML =
        `<span><strong>${stats.total_conversions}</strong> conversions</span>` +
        `<span><strong>${rate}%</strong> success</span>` +
        `<span>avg <strong>${formatDuration(stats.avg_duration_ms)}</strong></span>` +
        `<span><strong>${formatBytes(stats.total_size_bytes_processed)}</strong> processed</span>` +
        ocrStr;
    } catch (e) { /* stats not critical */ }
  })();

  // Fetch and render
  async function loadHistory() {
    updateURL();
    const qs = new URLSearchParams({
      page: currentPage,
      per_page: 25,
      sort: currentSort,
    });
    if (currentFormat) qs.set('format', currentFormat);
    if (currentStatus) qs.set('status', currentStatus);
    if (currentSearch) qs.set('search', currentSearch);

    try {
      const data = await API.get(`/api/history?${qs}`);
      renderTable(data);
      renderPagination(data);
      populateFormatFilter(data.formats_available || []);

      // Show/hide states
      const hasRecords = data.records.length > 0;
      const isFiltered = currentFormat || currentStatus || currentSearch;

      document.getElementById('history-table').closest('.card').hidden = !hasRecords;
      document.getElementById('pagination').hidden = !hasRecords;
      document.getElementById('empty-state').hidden = hasRecords || isFiltered;
      document.getElementById('empty-filtered').hidden = hasRecords || !isFiltered;

      if (!hasRecords && isFiltered) {
        const term = currentSearch ? ` matching "${currentSearch}"` : '';
        document.getElementById('empty-filtered-text').textContent = `No conversions${term} with the current filters.`;
      }
    } catch (e) {
      showError(`Failed to load history: ${e.message}`);
    }
  }

  function renderTable(data) {
    const body = document.getElementById('history-body');
    if (!data.records.length) { body.innerHTML = ''; return; }

    body.innerHTML = data.records.map(r => {
      const statusBadge = r.status === 'success'
        ? '<span class="status-ok">Success</span>'
        : '<span class="status-error">Error</span>';
      const rowClass = r.status === 'error' ? 'clickable-row row-error' : 'clickable-row';
      const ocrBadge = renderOcrBadge(r.ocr);
      const ocrDetail = renderOcrDetail(r.ocr);
      const isMedia = r.media_engine != null;
      const mediaIcon = isMedia ? ((['mp4','mov','avi','mkv','wmv','m4v','webm'].includes(r.source_format)) ? '&#127916; ' : '&#127925; ') : '';
      const engineLabels = {whisper_local:'Whisper',whisper_cloud_openai:'Cloud: OpenAI',whisper_cloud_gemini:'Cloud: Gemini',caption_ingest:'Caption'};
      const mediaBadge = isMedia ? `<span class="text-sm" style="padding:2px 6px;border-radius:3px;background:var(--surface-alt);margin-left:4px">${engineLabels[r.media_engine] || r.media_engine}</span>` : '';
      const mediaDuration = isMedia && r.media_duration_seconds ? (() => { const s=r.media_duration_seconds; return `${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`; })() : '';
      return `<tr class="${rowClass}" data-id="${r.id}">
        <td class="text-mono text-sm">${mediaIcon}${r.source_filename}</td>
        <td>${formatBadge(r.source_format)}${mediaBadge}</td>
        <td>${statusBadge}</td>
        <td class="text-mono text-sm">${isMedia && mediaDuration ? mediaDuration : formatDuration(r.duration_ms)}</td>
        <td class="text-sm">${formatLocalTime(r.created_at)}</td>
        <td>${ocrBadge}</td>
      </tr>
      <tr class="detail-row" id="detail-${r.id}">
        <td colspan="6">
          <dl class="detail-grid">
            <dt>Converted</dt><dd>${r.created_at || '—'}</dd>
            <dt>Direction</dt><dd>${r.direction === 'to_md' ? 'Document &rarr; Markdown' : 'Markdown &rarr; Document'}</dd>
            <dt>Output</dt><dd class="text-mono">${r.output_filename || '—'} ${r.file_size_bytes ? '(' + formatBytes(r.file_size_bytes) + ')' : ''}</dd>
            <dt>Batch</dt><dd class="text-mono text-sm">${r.batch_id}</dd>
            ${isMedia ? `<dt>Engine</dt><dd>${engineLabels[r.media_engine] || r.media_engine}</dd>` : ''}
            ${isMedia && r.media_language ? `<dt>Language</dt><dd>${r.media_language}</dd>` : ''}
            ${isMedia && r.media_word_count ? `<dt>Words</dt><dd>${r.media_word_count.toLocaleString()}</dd>` : ''}
            ${isMedia && r.media_duration_seconds ? `<dt>Duration</dt><dd>${mediaDuration}</dd>` : ''}
            ${isMedia && r.media_whisper_model ? `<dt>Model</dt><dd>${r.media_whisper_model}</dd>` : ''}
            <dt>OCR flags</dt><dd>${r.ocr_flags_total || 0} total, ${r.ocr_flags_resolved || 0} resolved</dd>
            ${ocrDetail}
            ${r.scene_count ? `<dt>Scenes</dt><dd>${r.scene_count} detected</dd>` : ''}
            ${r.enrichment_level ? `<dt>Enrichment</dt><dd>Level ${r.enrichment_level}${r.vision_provider ? ' &middot; ' + r.vision_provider + (r.vision_model ? ' (' + r.vision_model + ')' : '') : ''}</dd>` : ''}
            ${r.frame_desc_count != null && r.keyframe_count ? `<dt>Descriptions</dt><dd>${r.frame_desc_count}/${r.keyframe_count} successful${r.frame_desc_count < r.keyframe_count ? ' (' + (r.keyframe_count - r.frame_desc_count) + ' failed)' : ''}</dd>` : ''}
            ${r.error_message ? `<dt>Error</dt><dd class="status-error">${r.error_message}</dd>` : ''}
            ${r.warnings && r.warnings.length ? `<dt>Warnings</dt><dd>${r.warnings.join(', ')}</dd>` : ''}
          </dl>
          <div class="btn-group mt-1">
            <button class="btn btn-ghost btn-sm" onclick="redownload(${r.id}, this)">Download</button>
            ${r.ocr_flags_total > 0 ? `<a href="/review.html?batch_id=${r.batch_id}" class="btn btn-ghost btn-sm">OCR Review</a>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('');

    // Click handlers for rows
    body.querySelectorAll('.clickable-row').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        const detail = document.getElementById(`detail-${id}`);
        if (expandedRow && expandedRow !== detail) expandedRow.classList.remove('open');
        detail.classList.toggle('open');
        expandedRow = detail.classList.contains('open') ? detail : null;
      });
    });
  }

  function renderPagination(data) {
    const info = document.getElementById('pagination-info');
    const pages = document.getElementById('pagination-pages');
    const start = (data.page - 1) * data.per_page + 1;
    const end = Math.min(data.page * data.per_page, data.total);
    info.textContent = data.total > 0 ? `Showing ${start}–${end} of ${data.total}` : '';

    if (data.total_pages <= 1) { pages.innerHTML = ''; return; }

    let html = '';
    html += `<button ${data.page <= 1 ? 'disabled' : ''} onclick="goToPage(${data.page - 1})">&larr; Prev</button>`;

    const maxVisible = 7;
    const tp = data.total_pages;
    const cp = data.page;
    let pageNums = [];

    if (tp <= maxVisible) {
      for (let i = 1; i <= tp; i++) pageNums.push(i);
    } else {
      pageNums.push(1);
      if (cp > 3) pageNums.push('...');
      for (let i = Math.max(2, cp - 1); i <= Math.min(tp - 1, cp + 1); i++) pageNums.push(i);
      if (cp < tp - 2) pageNums.push('...');
      pageNums.push(tp);
    }

    for (const p of pageNums) {
      if (p === '...') {
        html += `<span class="ellipsis">...</span>`;
      } else {
        html += `<button class="${p === cp ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
      }
    }

    html += `<button ${data.page >= tp ? 'disabled' : ''} onclick="goToPage(${data.page + 1})">Next &rarr;</button>`;
    pages.innerHTML = html;
  }

  function populateFormatFilter(formats) {
    const sel = document.getElementById('filter-format');
    const current = sel.value;
    // Only repopulate if options changed
    if (sel.options.length - 1 === formats.length) return;
    sel.innerHTML = '<option value="">All formats</option>' +
      formats.map(f => `<option value="${f}" ${f === current ? 'selected' : ''}>${f.toUpperCase()}</option>`).join('');
  }

  async function redownload(id, btn) {
    btn.disabled = true;
    btn.textContent = 'Downloading...';
    try {
      const res = await fetch(`/api/history/${id}/redownload`);
      if (res.status === 410) {
        const data = await res.json().catch(() => ({}));
        btn.textContent = 'Expired';
        btn.disabled = true;
        showToast(data.message || data.detail?.message || 'Output files expired', 'error');
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const cd = res.headers.get('content-disposition') || '';
      const match = cd.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : 'download';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
      btn.textContent = 'Download';
      btn.disabled = false;
    } catch (e) {
      btn.textContent = 'Download';
      btn.disabled = false;
      showToast('Download failed: ' + e.message, 'error');
    }
  }

  // Navigation
  function goToPage(p) { currentPage = p; loadHistory(); }

  function updateURL() {
    const p = new URLSearchParams();
    if (currentFormat) p.set('format', currentFormat);
    if (currentStatus) p.set('status', currentStatus);
    if (currentSearch) p.set('search', currentSearch);
    if (currentSort !== 'date_desc') p.set('sort', currentSort);
    if (currentPage > 1) p.set('page', currentPage);
    const qs = p.toString();
    history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
  }

  function clearFilters() {
    currentFormat = '';
    currentStatus = '';
    currentSearch = '';
    currentPage = 1;
    document.getElementById('filter-format').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-search').value = '';
    loadHistory();
  }

  // Sorting
  document.querySelectorAll('[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const base = th.dataset.sort.replace(/_(?:asc|desc)$/, '');
      const isAsc = currentSort === base + '_asc';
      currentSort = isAsc ? base + '_desc' : base + '_asc';
      currentPage = 1;
      // Update sort indicators
      document.querySelectorAll('.sort-icon').forEach(s => s.textContent = '');
      th.querySelector('.sort-icon').textContent = isAsc ? ' ↓' : ' ↑';
      loadHistory();
    });
  });

  // Filter events
  document.getElementById('filter-format').addEventListener('change', e => {
    currentFormat = e.target.value; currentPage = 1; loadHistory();
  });
  document.getElementById('filter-status').addEventListener('change', e => {
    currentStatus = e.target.value; currentPage = 1; loadHistory();
  });
  document.getElementById('filter-search').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      currentSearch = e.target.value.trim();
      currentPage = 1;
      loadHistory();
    }, 300);
  });

  // Initial load
  loadHistory();

  // ── Force Transcribe / Convert Pending button (v0.30.3) ──────────────────
  // Delegates to the existing /api/pipeline/run-now path which triggers an
  // immediate scan + convert cycle. The bulk worker picks up every pending
  // file in priority order, including audio/video → Whisper transcription.
  document.getElementById('force-transcribe-btn')?.addEventListener('click', async function() {
    var btn = this;
    if (!confirm('Trigger an immediate scan + convert cycle? This will pick up every pending file (including audio/video for Whisper transcription) and may consume LLM/transcription quota.')) return;
    btn.disabled = true;
    var origText = btn.textContent;
    btn.textContent = 'Triggering...';
    try {
      var resp = await fetch('/api/pipeline/run-now', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
      });
      if (!resp.ok) {
        var detail = await resp.text().catch(function() { return ''; });
        throw new Error('HTTP ' + resp.status + ' ' + detail.slice(0, 200));
      }
      if (typeof showToast === 'function') {
        showToast('Run Now triggered — pending files will be processed shortly');
      }
      btn.textContent = 'Triggered ✓';
      setTimeout(function() {
        btn.textContent = origText;
        btn.disabled = false;
        loadPending();
      }, 2500);
    } catch (e) {
      showError('Failed to trigger: ' + e.message);
      btn.textContent = origText;
      btn.disabled = false;
    }
  });

  // ── Pending Files ─────────────────────────────────────────────────────────
  var pendingPage = 1;
  var pendingPerPage = 50;
  var pendingRefreshTimer = null;
  // v0.31.6: per-row selection state. Keyed by bulk_files.id so it
  // survives pagination + filter changes within the same session.
  // Cleared on "Clear selection" or after a successful Convert Selected
  // batch dispatches. Cap at the same 100-file limit the backend
  // enforces — surface a UI-side message before the user commits.
  var pendingSelectedIds = new Set();
  var PENDING_SELECT_CAP = 100;
  // Cache of {id: file_dict} so the bulk bar can summarize size/types
  // even when the user scrolled past the page where they checked them.
  var pendingSelectedFiles = Object.create(null);

  function updatePendingBulkBar() {
    var bar = document.getElementById('pending-bulk-bar');
    var count = pendingSelectedIds.size;
    var countEl = document.getElementById('pending-bulk-count');
    var ctxEl = document.getElementById('pending-bulk-context');
    var btn = document.getElementById('pending-bulk-convert');
    if (!bar) return;
    if (count === 0) {
      bar.hidden = true;
      bar.style.display = 'none';
      return;
    }
    bar.hidden = false;
    bar.style.display = 'flex';
    countEl.textContent = count + ' selected';

    // Summarize the selection: total size + dominant file type +
    // current status filter context. Operators glancing at the bar
    // should know exactly what they're about to commit to.
    var totalBytes = 0;
    var typeCounts = Object.create(null);
    var statusCounts = Object.create(null);
    Object.keys(pendingSelectedFiles).forEach(function(id) {
      if (!pendingSelectedIds.has(id)) return;
      var f = pendingSelectedFiles[id];
      totalBytes += (f.file_size_bytes || 0);
      var ext = (f.file_ext || '?').toLowerCase();
      typeCounts[ext] = (typeCounts[ext] || 0) + 1;
      var st = f.status || 'pending';
      statusCounts[st] = (statusCounts[st] || 0) + 1;
    });
    var topTypes = Object.keys(typeCounts)
      .sort(function(a, b) { return typeCounts[b] - typeCounts[a]; })
      .slice(0, 3)
      .map(function(t) { return typeCounts[t] + '× ' + t; })
      .join(', ');
    var statusFilter = document.getElementById('pending-status-filter').value;
    var verb = (statusFilter === 'failed') ? 'Retry' : 'Convert';
    btn.textContent = verb + ' Selected (' + count + ')';

    var ctxParts = [];
    if (topTypes) ctxParts.push(topTypes);
    ctxParts.push(formatBytes(totalBytes) + ' total');
    if (count > PENDING_SELECT_CAP) {
      ctxParts.push('⚠ above ' + PENDING_SELECT_CAP + '-file cap');
      btn.disabled = true;
      btn.title = 'Selection exceeds the per-call cap of '
        + PENDING_SELECT_CAP + '. Untick some rows to proceed; for full '
        + 'pipeline runs use Force Transcribe / Convert Pending.';
    } else {
      btn.disabled = false;
      btn.title = '';
    }
    ctxEl.textContent = ctxParts.join(' · ');
  }

  function clearPendingSelection() {
    pendingSelectedIds.clear();
    pendingSelectedFiles = Object.create(null);
    document.querySelectorAll('.pending-row-cb').forEach(function(cb) {
      cb.checked = false;
    });
    var sa = document.getElementById('pending-select-all');
    if (sa) { sa.checked = false; sa.indeterminate = false; }
    updatePendingBulkBar();
  }

  function syncSelectAllState() {
    var sa = document.getElementById('pending-select-all');
    if (!sa) return;
    var rows = document.querySelectorAll('.pending-row-cb');
    var checked = 0;
    rows.forEach(function(cb) { if (cb.checked) checked++; });
    if (checked === 0) {
      sa.checked = false;
      sa.indeterminate = false;
    } else if (checked === rows.length) {
      sa.checked = true;
      sa.indeterminate = false;
    } else {
      sa.checked = false;
      sa.indeterminate = true;
    }
  }

  async function loadPending() {
    var statusFilter = document.getElementById('pending-status-filter').value;
    var search = document.getElementById('pending-search').value.trim();
    var qs = 'status=' + statusFilter + '&page=' + pendingPage + '&per_page=' + pendingPerPage;
    if (search) qs += '&search=' + encodeURIComponent(search);

    try {
      var data = await API.get('/api/bulk/pending?' + qs);
      var card = document.getElementById('pending-card');
      card.hidden = false;

      document.getElementById('pending-count-badge').textContent = data.total.toLocaleString();
      // Color the badge based on status filter
      var badge = document.getElementById('pending-count-badge');
      if (statusFilter === 'failed') {
        badge.style.background = 'rgba(220,38,38,0.12)';
        badge.style.color = 'var(--error)';
      } else {
        badge.style.background = 'rgba(79,91,213,0.12)';
        badge.style.color = 'var(--accent)';
      }

      var tbody = document.getElementById('pending-tbody');
      tbody.textContent = '';

      if (!data.files || !data.files.length) {
        var tr = document.createElement('tr');
        var td = document.createElement('td');
        // v0.31.6: colSpan goes 5→6 to cover the new checkbox column.
        td.colSpan = 6;
        td.style.textAlign = 'center';
        td.style.padding = '1.5rem';
        td.style.color = 'var(--text-muted)';
        td.textContent = statusFilter === 'failed' ? 'No failed files.' : 'No pending files.';
        tr.appendChild(td);
        tbody.appendChild(tr);
        document.getElementById('pending-pagination').textContent = '';
        return;
      }

      data.files.forEach(function(f) {
        var tr = document.createElement('tr');

        // v0.31.6: per-row checkbox. Bound to pendingSelectedIds so
        // selection persists across pagination + filter changes.
        var tdCb = document.createElement('td');
        tdCb.style.paddingRight = '0';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'pending-row-cb';
        cb.dataset.fileId = f.id;
        cb.style.cursor = 'pointer';
        cb.style.margin = '0';
        if (pendingSelectedIds.has(f.id)) cb.checked = true;
        cb.addEventListener('change', function() {
          if (cb.checked) {
            pendingSelectedIds.add(f.id);
            pendingSelectedFiles[f.id] = f;
          } else {
            pendingSelectedIds.delete(f.id);
            delete pendingSelectedFiles[f.id];
          }
          syncSelectAllState();
          updatePendingBulkBar();
        });
        tdCb.appendChild(cb);
        tr.appendChild(tdCb);

        // File path
        var tdFile = document.createElement('td');
        tdFile.style.wordBreak = 'break-all';
        var path = f.source_path || '';
        var parts = path.replace(/\\/g, '/').split('/');
        tdFile.textContent = parts.length > 3 ? '.../' + parts.slice(-3).join('/') : path;
        tdFile.title = path;
        tr.appendChild(tdFile);

        // Type
        var tdType = document.createElement('td');
        tdType.textContent = f.file_ext || '-';
        tdType.style.color = 'var(--text-muted)';
        tr.appendChild(tdType);

        // Size
        var tdSize = document.createElement('td');
        tdSize.textContent = formatBytes(f.file_size_bytes);
        tr.appendChild(tdSize);

        // Job started
        var tdStarted = document.createElement('td');
        tdStarted.textContent = f.job_started_at ? formatLocalTime(f.job_started_at) : '-';
        tdStarted.style.fontSize = '0.78rem';
        tr.appendChild(tdStarted);

        // Status / Error
        var tdStatus = document.createElement('td');
        var statusSpan = document.createElement('span');
        var fileStatus = f.status || 'pending';
        if (fileStatus === 'failed' || fileStatus === 'adobe_failed') {
          statusSpan.style.color = 'var(--error)';
          statusSpan.textContent = f.error_msg || fileStatus;
        } else if (fileStatus === 'for_review') {
          statusSpan.style.color = 'var(--warn)';
          statusSpan.textContent = 'Needs review';
        } else {
          statusSpan.style.color = 'var(--ok)';
          statusSpan.textContent = fileStatus;
        }
        statusSpan.style.fontSize = '0.8rem';
        tdStatus.appendChild(statusSpan);
        tr.appendChild(tdStatus);

        tbody.appendChild(tr);
      });

      // Pagination
      var pagEl = document.getElementById('pending-pagination');
      pagEl.textContent = '';
      if (data.total_pages > 1) {
        var prevBtn = document.createElement('button');
        prevBtn.className = 'btn btn-sm';
        prevBtn.textContent = '\u00ab Prev';
        prevBtn.disabled = data.page <= 1;
        prevBtn.addEventListener('click', function() { pendingPage--; loadPending(); });
        pagEl.appendChild(prevBtn);

        var info = document.createElement('span');
        info.className = 'text-muted';
        info.textContent = 'Page ' + data.page + ' of ' + data.total_pages + ' (' + data.total.toLocaleString() + ' files)';
        pagEl.appendChild(info);

        var nextBtn = document.createElement('button');
        nextBtn.className = 'btn btn-sm';
        nextBtn.textContent = 'Next \u00bb';
        nextBtn.disabled = data.page >= data.total_pages;
        nextBtn.addEventListener('click', function() { pendingPage++; loadPending(); });
        pagEl.appendChild(nextBtn);
      } else {
        var info = document.createElement('span');
        info.className = 'text-muted';
        info.textContent = data.total.toLocaleString() + ' files';
        pagEl.appendChild(info);
      }

      // v0.31.6: re-sync the select-all checkbox + bulk bar against the
      // freshly-rendered rows. Selections survive page changes via the
      // pendingSelectedIds Set, but the DOM checkboxes need restoring
      // and the indeterminate state on select-all needs recomputing
      // for the rows currently visible.
      syncSelectAllState();
      updatePendingBulkBar();
    } catch(e) {
      // Silently fail — pending section is supplementary
    }
  }

  document.getElementById('pending-status-filter').addEventListener('change', function() {
    pendingPage = 1;
    // Status filter switch invalidates the selection: a row that was
    // selected as "pending" might not even appear under "failed",
    // and the ineligible-statuses guard on the backend would reject
    // a mixed batch. Clearing keeps the UX honest.
    clearPendingSelection();
    loadPending();
  });

  var pendingSearchTimer;
  document.getElementById('pending-search').addEventListener('input', function() {
    clearTimeout(pendingSearchTimer);
    pendingSearchTimer = setTimeout(function() { pendingPage = 1; loadPending(); }, 300);
  });

  // ── v0.31.6: bulk-bar wiring ───────────────────────────────────────────────
  // Select-all toggles every visible row's checkbox AND adds/removes
  // those ids from the global selection set. Cross-page state is
  // preserved (toggling all on page 2 doesn't touch page 1's
  // selection). Cap-aware: if checking all on this page would push
  // total over PENDING_SELECT_CAP, we still allow it but the bulk
  // bar renders the "above cap" warning.
  document.getElementById('pending-select-all')?.addEventListener('change', function(ev) {
    var checked = ev.target.checked;
    document.querySelectorAll('.pending-row-cb').forEach(function(cb) {
      cb.checked = checked;
      var fid = cb.dataset.fileId;
      if (checked) {
        pendingSelectedIds.add(fid);
        // Walk the table for the file dict — we kept it on the
        // closure earlier in the row render. Easier to look up via
        // a lazy fetch when not present.
        if (!pendingSelectedFiles[fid]) {
          // We don't have the dict if the row was rendered in a prior
          // page-load. Best-effort metadata: leave a stub with the id
          // so the bulk bar's count is still accurate.
          pendingSelectedFiles[fid] = { id: fid };
        }
      } else {
        pendingSelectedIds.delete(fid);
        delete pendingSelectedFiles[fid];
      }
    });
    updatePendingBulkBar();
  });

  document.getElementById('pending-bulk-clear')?.addEventListener('click', clearPendingSelection);

  document.getElementById('pending-bulk-convert')?.addEventListener('click', async function() {
    var btn = this;
    var ids = Array.from(pendingSelectedIds);
    if (ids.length === 0) return;
    if (ids.length > PENDING_SELECT_CAP) {
      showError('Selection of ' + ids.length + ' exceeds the per-call cap of '
        + PENDING_SELECT_CAP + '. Untick some rows or use Force Transcribe / '
        + 'Convert Pending for the full set.');
      return;
    }
    var verb = (document.getElementById('pending-status-filter').value === 'failed')
      ? 'retry' : 'convert';
    var msg = 'Schedule ' + ids.length + ' selected file'
      + (ids.length === 1 ? '' : 's')
      + ' for immediate ' + verb + '? '
      + 'They will run with up to 4 concurrent workers; '
      + 'large media files (audio/video) may take minutes each.';
    if (!confirm(msg)) return;

    btn.disabled = true;
    var origText = btn.textContent;
    btn.textContent = 'Scheduling...';
    try {
      var resp = await fetch('/api/pipeline/convert-selected', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ file_ids: ids }),
      });
      if (!resp.ok) {
        var detail = await resp.text().catch(function() { return ''; });
        throw new Error('HTTP ' + resp.status + ' ' + detail.slice(0, 300));
      }
      var data = await resp.json();
      if (typeof showToast === 'function') {
        var tmsg = 'Scheduled ' + data.queued + ' file'
          + (data.queued === 1 ? '' : 's') + ' for conversion';
        if (data.ineligible && data.ineligible.length) {
          tmsg += ' (' + data.ineligible.length + ' skipped — not in pending/failed)';
        }
        if (data.not_found && data.not_found.length) {
          tmsg += ' (' + data.not_found.length + ' missing — already removed?)';
        }
        showToast(tmsg);
      }
      clearPendingSelection();
      btn.textContent = 'Scheduled ✓';
      setTimeout(function() {
        btn.textContent = origText;
        btn.disabled = false;
        loadPending();
      }, 2000);
    } catch (e) {
      showError('Scheduling failed: ' + e.message);
      btn.textContent = origText;
      btn.disabled = false;
    }
  });

  loadPending();
  // Auto-refresh pending count every 30s
  setInterval(loadPending, 30000);
  </script>
</body>
</html>
