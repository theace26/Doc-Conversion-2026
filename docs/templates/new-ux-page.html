<!DOCTYPE html>
<!-- ============================================================
     NEW-UX PAGE TEMPLATE
     ============================================================
     How to use this file:
       1. Copy this file to static/{{PAGE_ID}}-new.html
          (e.g. static/history-new.html)
       2. Replace every {{PLACEHOLDER}} with a real value.
       3. Copy new-ux-page-boot.js to static/js/{{PAGE_ID}}-new-boot.js
       4. Copy new-ux-page-component.js to static/js/pages/{{PAGE_ID}}.js
       5. Add a serve_ux_page() route in main.py (see docs/templates/README.md)

     REPLACE THIS: all {{...}} markers below.
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Inline pref-flash guard: runs synchronously before first paint so the
       page renders in the user's preferred theme/font without flicker.
       Do NOT modify this block — it is identical in every new-UX page. -->
  <script>
  (function(){
    var D={theme:'nebula',font:'system',textScale:'default',useNewUx:true};
    var p=Object.assign({},D,JSON.parse(localStorage.getItem('mf:preferences:v1')||'{}'));
    var h=document.documentElement;
    h.setAttribute('data-theme',p.theme);
    h.setAttribute('data-font',p.font);
    h.setAttribute('data-text-scale',p.textScale);
    h.setAttribute('data-ux',p.useNewUx?'new':'orig');
  })();
  </script>

  <!-- Google Fonts: keep this block exactly as-is across all new-UX pages. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;600&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;500;700&family=Poppins:wght@400;500;600&family=DM+Sans:wght@400;500&family=Crimson+Pro:wght@400;600&display=swap">

  <!-- REPLACE THIS: update the page title -->
  <title>MarkFlow — {{PAGE_TITLE}}</title>

  <!-- components.css provides all new-UX design tokens + component styles. -->
  <link rel="stylesheet" href="/static/css/components.css">

  <style>
    /* Page-level layout only — no overrides to components.css variables. */
    body {
      margin: 0;
      background: var(--mf-bg-page);
      font-family: -apple-system, "SF Pro Display", Inter, system-ui, sans-serif;
      min-height: 100vh;
    }
  </style>
</head>
<body data-env="dev">
  <!-- Top navigation bar (mounted by boot script) -->
  <div id="mf-top-nav"></div>

  <!-- REPLACE THIS: update the mount point ID to match {{PAGE_ID}} -->
  <!-- e.g. id="mf-history-page" for the history page -->
  <div id="mf-{{PAGE_ID}}-page"></div>

  <!-- ── Script loading order ─────────────────────────────────────────────
       Load order matters. Each script depends on the ones above it.
       Do NOT reorder.
       ──────────────────────────────────────────────────────────────────── -->

  <!-- Core preferences module (exposes MFPrefs global) -->
  <script src="/static/js/preferences.js"></script>

  <!-- Telemetry (exposes MFTelemetry global; no-op if server unreachable) -->
  <script src="/static/js/telemetry.js"></script>

  <!-- Keyboard shortcuts (exposes MFKeybinds global) -->
  <script src="/static/js/keybinds.js"></script>

  <!-- Chrome components (top nav, version chip, avatar, layout) -->
  <script src="/static/js/components/top-nav.js"></script>
  <script src="/static/js/components/version-chip.js"></script>
  <script src="/static/js/components/avatar.js"></script>
  <script src="/static/js/components/avatar-menu.js"></script>
  <script src="/static/js/components/avatar-menu-wiring.js"></script>
  <script src="/static/js/components/layout-icon.js"></script>
  <script src="/static/js/components/layout-popover.js"></script>

  <!-- REPLACE THIS: update the path to match {{PAGE_ID}} -->
  <!-- Page component (exposes MF{{COMPONENT_NAME}} global) -->
  <script src="/static/js/pages/{{PAGE_ID}}.js"></script>

  <!-- Display preferences drawer (lazy-loaded by avatar menu; listed here for
       caching purposes — the boot script does NOT call it directly) -->
  <script src="/static/js/components/display-prefs-drawer.js"></script>

  <!-- REPLACE THIS: update the path to match {{PAGE_ID}} -->
  <!-- Boot script: wires chrome + page component after /api/me resolves -->
  <script src="/static/js/{{PAGE_ID}}-new-boot.js"></script>
</body>
</html>
