# docker-compose.override.yml — Apple Silicon / no-NVIDIA developer override.
#
# docker-compose auto-merges this file on top of docker-compose.yml when both
# are present. Zeroing out `deploy:` for the two services that declared a
# GPU reservation prevents `docker-compose up` from failing on machines
# without the NVIDIA Container Toolkit (e.g., macOS on M-series chips).
#
# If you DO have GPUs locally (Linux + nvidia-container-toolkit, or Windows
# Docker Desktop with WSL2 GPU support), delete this file — the base compose
# will reclaim the GPU reservation block.
#
# Tests that need the container image can also bypass this entirely via:
#   docker run --rm -v "$(pwd)":/src -w /src doc-conversion-2026-markflow:latest <cmd>

services:
  markflow:
    # `!reset null` explicitly zeros out the parent's deploy block — this is
    # the documented way to remove a key via an override. Empty dicts and
    # empty lists are treated as "unchanged" by docker-compose's merge, so
    # a plain `deploy: {}` or `devices: []` would NOT clear the parent's
    # NVIDIA GPU reservation. Requires docker-compose >= 2.24.
    deploy: !reset null
  markflow-mcp:
    deploy: !reset null
