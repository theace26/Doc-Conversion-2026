services:

  # ── Main MarkFlow app ──────────────────────────────────────────────────────
  markflow:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Universal Storage Manager (v0.25.0): /host/root is read-only browse of the entire host.
      # DANGER: /host/rw is unrestricted at the kernel level. The write guard in core/storage_manager.py (is_write_allowed) is the ONLY barrier. Do not disable it or relax the check.
      - /:/host/root:ro
      - /:/host/rw
      # Legacy mounts retained for backward compatibility:
      - markflow-db:/app/data                             # SQLite — persistent
      - ./output:/app/output                              # Single-file conversion results
      - ./logs:/app/logs                                  # Structured JSON logs
      - ${SOURCE_DIR:-/tmp/markflow-nosource}:/mnt/source:ro                        # Input — READ ONLY
      - ${OUTPUT_DIR:-./output}:/mnt/output-repo                    # Bulk conversion output
      # v0.29.2: drive mounts are writable. The app-level write guard
      # (core/storage_manager.is_write_allowed) is the sole barrier — same
      # enforcement model as /host/rw above. Previously `:ro`, which blocked
      # users from picking a drive path (e.g. /host/d/Doc-Conv_Test) as the
      # configured output directory even though the write guard would have
      # permitted it.
      - ${DRIVE_C:-C:/}:/host/c                           # Drive — C:
      - ${DRIVE_D:-D:/}:/host/d                           # Drive — D:
      - ${HASHCAT_QUEUE_DIR:-./hashcat-queue}:/mnt/hashcat-queue  # GPU cracking job queue
      - ./config:/app/config:ro                              # Config files (archive passwords, etc.)
      - whisper-cache:/root/.cache/whisper                     # Whisper model cache — persistent
    # SYS_ADMIN: required for the in-container mount() syscall used by
    # Universal Storage Manager to dynamically mount CIFS/SMB/NFS shares (v0.25.0).
    cap_add:
      - SYS_ADMIN
    environment:
      - DEBUG=false
      - WORKERS=1
      - DB_PATH=/app/data/markflow.db
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
      - BULK_WORKER_COUNT=${BULK_WORKER_COUNT:-4}
      - BULK_SOURCE_PATH=/mnt/source
      - BULK_OUTPUT_PATH=/mnt/output-repo
      - MOUNTED_DRIVES=c,d
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-prod}
      - MCP_HOST=markflow-mcp
      - MCP_PORT=${MCP_PORT:-8001}
      - DEFAULT_LOG_LEVEL=${DEFAULT_LOG_LEVEL:-normal}
      - DEV_BYPASS_AUTH=true
      - API_KEY_SALT=${API_KEY_SALT:-}
      - UNIONCORE_JWT_SECRET=${UNIONCORE_JWT_SECRET:-}
      - UNIONCORE_ORIGIN=${UNIONCORE_ORIGIN:-}
      # AI-Assisted Search (v0.21.0)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_ASSIST_MODEL=${AI_ASSIST_MODEL:-claude-sonnet-4-20250514}
      - AI_ASSIST_MAX_TOKENS=${AI_ASSIST_MAX_TOKENS:-700}
      - AI_ASSIST_EXPAND_MAX_TOKENS=${AI_ASSIST_EXPAND_MAX_TOKENS:-900}
      # Vector search (v0.22.0)
      - QDRANT_HOST=${QDRANT_HOST:-http://qdrant:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-markflow_chunks}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-64}
      # Log rotation (size-based) — uncomment to override defaults
      # - LOG_MAX_SIZE_MB=50           # Operational log max size (default: 50 MB)
      # - DEBUG_LOG_MAX_SIZE_MB=100    # Debug log max size (default: 100 MB)
      # - LOG_BACKUP_COUNT=5           # Operational log backup count (default: 5)
      # - DEBUG_LOG_BACKUP_COUNT=3     # Debug log backup count (default: 3)
      # - LOG_DOWNLOAD_MAX_MB=500      # Max downloadable log file size (default: 500 MB)
      # - LOG_ARCHIVE_RETENTION_DAYS=90 # How long to keep compressed log archives (default: 90)
      # Archive processing limits
      # - ARCHIVE_MAX_DEPTH=20           # Max nesting depth for archives-in-archives
      # - ARCHIVE_MAX_SIZE_GB=50         # Max total decompressed size per archive (GB)
      # - ARCHIVE_MAX_ENTRIES=100000     # Max number of entries in a single archive
      # - ARCHIVE_PASSWORD_FILE=config/archive_passwords.txt
    depends_on:
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # GPU passthrough for Whisper transcription (v0.22.15).
    # Requires NVIDIA Container Toolkit installed on the host (Docker Desktop
    # on Windows: enable GPU support in WSL2; Linux: install nvidia-container-toolkit).
    # If the host has no NVIDIA GPU, comment out this whole block — the CUDA
    # torch wheel transparently falls back to CPU, so the app still runs.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── MCP server (Claude.ai connector) ──────────────────────────────────────
  markflow-mcp:
    build: .
    command: python -m mcp_server.server
    ports:
      - "8001:8001"
    volumes:
      - markflow-db:/app/data                             # Shared DB with main app
      - ./output:/app/output                              # Same output dir as main app
      - ${OUTPUT_DIR}:/mnt/output-repo                    # Read converted files
    environment:
      - DB_PATH=/app/data/markflow.db
      - OUTPUT_DIR=/app/output
      - MCP_PORT=8001
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-prod}
    depends_on:
      - markflow
      - meilisearch
    restart: unless-stopped

  # ── Meilisearch (full-text search) ────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
      - MEILI_ENV=development
      - MEILI_MAX_INDEXING_MEMORY=${MEILI_MAX_INDEXING_MEMORY:-1073741824}
    volumes:
      - meilisearch-data:/meili_data
    deploy:
      resources:
        limits:
          memory: ${MEILI_MEMORY_LIMIT:-1g}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant vector search (v0.22.0) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    environment:
      # Silence hourly "Failed to report telemetry" errors to telemetry.qdrant.io
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEMORY_LIMIT:-512m}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  markflow-db:        # SQLite database — survives container restarts
  meilisearch-data:   # Meilisearch index — survives container restarts
  qdrant-data:        # Qdrant vector index — survives container restarts
  whisper-cache:      # Whisper model files — survives container restarts